m3: [
{id:'m3_01',topic:'arch_def',type:'single',question:'Data Architecture PRIMARILY answers:',options:['What programming language to use','What data the organization needs and how it flows','How many servers to buy','What color the UI should be'],correct:1,explanation:'Data Architecture describes what data is needed, where it resides, and how it moves.'},
{id:'m3_02',topic:'arch_def',type:'single',question:'Data Architecture differs from Data Modeling in that:',options:['Architecture = strategic level, Modeling = detailed design','They are identical','Modeling is broader than Architecture','Architecture only concerns databases'],correct:0,explanation:'Architecture = city plan (strategic). Modeling = building blueprint (detailed).'},
{id:'m3_03',topic:'arch_def',type:'truefalse',question:'Data Architecture is one of the four domains of Enterprise Architecture.',options:['True','False'],correct:0,explanation:'True. EA = Business + Data + Application + Technology architectures.'},
{id:'m3_04',topic:'arch_def',type:'single',question:'Which is NOT a goal of Data Architecture?',options:['Reduce data redundancy','Support data reuse','Write application code','Eliminate data silos'],correct:2,explanation:'Writing code is a developer task, not an architecture goal.'},
{id:'m3_05',topic:'arch_def',type:'fillin',question:'What English term describes isolated, unintegrated data sets?',correct:['data silos','Data Silos','data silo'],explanation:'Data Silos = isolated data sets not integrated with other systems.'},
{id:'m3_06',topic:'arch_def',type:'single',question:'Data redundancy is a problem because:',options:['Data is too small','Duplicate data creates inconsistency risk','Servers are too fast','Networks are too secure'],correct:1,explanation:'Redundancy = same data in multiple places, risking inconsistency.'},
{id:'m3_07',topic:'arch_def',type:'single',question:'Data reuse means:',options:['Deleting old data','Using the same data asset for multiple purposes','Copying data to USB drives','Printing data reports'],correct:1,explanation:'Data reuse = leveraging existing data assets for multiple business needs.'},
{id:'m3_08',topic:'artifacts',type:'single',question:'A Data Catalog provides:',options:['Server specifications','An inventory of all data assets with owners and descriptions','Programming templates','Network diagrams'],correct:1,explanation:'Data Catalog = inventory of data with descriptions, owners, and locations.'},
{id:'m3_09',topic:'artifacts',type:'single',question:'DFD stands for:',options:['Database File Directory','Data Flow Diagram','Digital Format Document','Data Factory Design'],correct:1,explanation:'DFD = Data Flow Diagram — shows how data moves between systems.'},
{id:'m3_10',topic:'artifacts',type:'single',question:'CRUD in CRUD Matrix stands for:',options:['Copy, Replicate, Update, Delete','Create, Read, Update, Delete','Compile, Run, Upload, Download','Configure, Report, Undo, Deploy'],correct:1,explanation:'CRUD = Create, Read, Update, Delete — basic data operations.'},
{id:'m3_11',topic:'artifacts',type:'single',question:'Subject Area Model shows:',options:['Detailed table schemas','High-level business domains and their relationships','Server room layouts','Code repositories'],correct:1,explanation:'Subject Area Model = high-level view of business domains (customers, products, etc.).'},
{id:'m3_12',topic:'artifacts',type:'single',question:'SSOT principle ensures:',options:['Data is stored on multiple servers','Each data element has one authoritative source','All data is encrypted','Backups are automated'],correct:1,explanation:'SSOT = Single Source of Truth = one authoritative source per data element.'},
{id:'m3_13',topic:'artifacts',type:'truefalse',question:'CRUD Matrix maps business processes to data operations.',options:['True','False'],correct:0,explanation:'True. CRUD Matrix = processes × data, showing Create/Read/Update/Delete.'},
{id:'m3_14',topic:'artifacts',type:'fillin',question:'What does CRUD stand for?',correct:['create read update delete','Create Read Update Delete'],explanation:'CRUD = Create, Read, Update, Delete.'},
{id:'m3_15',topic:'as_is',type:'single',question:'As-Is architecture describes:',options:['The target state','The current state','A hypothetical ideal','A vendor proposal'],correct:1,explanation:'As-Is = current state of the data architecture.'},
{id:'m3_16',topic:'as_is',type:'single',question:'To-Be architecture reflects:',options:['Legacy systems only','The target state aligned with business strategy','Current problems only','Past architecture decisions'],correct:1,explanation:'To-Be = target state that supports the business strategy.'},
{id:'m3_17',topic:'as_is',type:'single',question:'A Roadmap in data architecture is:',options:['A list of employees','A plan to transition from As-Is to To-Be','A database schema','A backup schedule'],correct:1,explanation:'Roadmap = prioritized plan for transitioning from current to target state.'},
{id:'m3_18',topic:'as_is',type:'truefalse',question:'You should create To-Be architecture without analyzing As-Is first.',options:['True','False'],correct:1,explanation:'Always start with As-Is. Target architecture without understanding reality is not viable.'},
{id:'m3_19',topic:'frameworks',type:'single',question:'TOGAF stands for:',options:['The Open Group Architecture Framework','Total Operations Government And Finance','Technical Operations Guide for Applications','The Oracle Global Architecture Format'],correct:0,explanation:'TOGAF = The Open Group Architecture Framework.'},
{id:'m3_20',topic:'frameworks',type:'single',question:'Zachman Framework uses:',options:['A linear approach','A matrix approach (questions × abstraction levels)','A circular approach','A random approach'],correct:1,explanation:'Zachman = matrix with questions (what, how, where, who, when, why) × levels.'},
{id:'m3_21',topic:'frameworks',type:'single',question:'The MOST widely used EA framework is:',options:['ITIL','TOGAF','COBIT','PMBOK'],correct:1,explanation:'TOGAF = most widely adopted Enterprise Architecture framework.'},
{id:'m3_22',topic:'frameworks',type:'single',question:'Shadow IT refers to:',options:['Dark server rooms','Systems built by departments without IT coordination','Encrypted systems','Backup systems'],correct:1,explanation:'Shadow IT = unauthorized systems created by business units.'},
{id:'m3_23',topic:'frameworks',type:'single',question:'Technical Debt in architecture means:',options:['Money owed to vendors','Accumulated architectural compromises that hinder evolution','Employee training costs','License fees'],correct:1,explanation:'Technical Debt = past shortcuts/compromises that make future changes harder.'},
{id:'m3_24',topic:'arch_def',type:'single',question:'Which EA domain covers business processes and strategy?',options:['Data Architecture','Technology Architecture','Business Architecture','Application Architecture'],correct:2,explanation:'Business Architecture = processes, organization, strategy.'},
{id:'m3_25',topic:'arch_def',type:'single',question:'Application Architecture describes:',options:['Data structures','Information systems (applications)','Network cables','Data governance'],correct:1,explanation:'Application Architecture = the organization\'s information systems.'},
{id:'m3_26',topic:'artifacts',type:'single',question:'A DFD shows:',options:['Employee org chart','Data sources, consumers, transformations, and stores','Financial reports','Software code'],correct:1,explanation:'DFD visualizes data movement: sources, consumers, transformations, stores.'},
{id:'m3_27',topic:'as_is',type:'single',question:'Roadmap includes:',options:['Only target state','Prioritized initiatives, phases, and dependencies','Only current state','Employee resumes'],correct:1,explanation:'Roadmap = initiatives + phases + dependencies + resource estimates.'},
{id:'m3_28',topic:'frameworks',type:'truefalse',question:'TOGAF is a data quality framework.',options:['True','False'],correct:1,explanation:'False. TOGAF = Enterprise Architecture framework, not data quality.'},
{id:'m3_29',topic:'arch_def',type:'single',question:'Data Architecture creates the foundation for:',options:['HR recruitment','Data Integration','Marketing campaigns','Legal contracts'],correct:1,explanation:'Architecture defines data flows and integration points — foundation for integration.'},
{id:'m3_30',topic:'artifacts',type:'single',question:'Naming Conventions in architecture define:',options:['Server names','Standards for naming data elements','Employee titles','Department names'],correct:1,explanation:'Naming Conventions = rules for naming fields, tables, and data elements.'},
{id:'m3_31',topic:'as_is',type:'single',question:'Data Silos are BEST resolved through:',options:['More silos','Architecture-driven integration','Ignoring them','Deleting data'],correct:1,explanation:'Data Architecture plans integration to break down silos.'},
{id:'m3_32',topic:'frameworks',type:'single',question:'What Zachman columns represent:',options:['Database columns','Questions: what, how, where, who, when, why','Programming languages','Server specifications'],correct:1,explanation:'Zachman columns = interrogatives (what, how, where, who, when, why).'},
{id:'m3_33',topic:'arch_def',type:'truefalse',question:'Enterprise Architecture includes exactly 4 domains.',options:['True','False'],correct:0,explanation:'True. EA = Business + Data + Application + Technology.'},
{id:'m3_34',topic:'artifacts',type:'single',question:'Which artifact would help a BA understand what systems create/use customer data?',options:['Network diagram','CRUD Matrix','Gantt chart','Budget report'],correct:1,explanation:'CRUD Matrix shows which processes/systems create, read, update, delete specific data.'},
{id:'m3_35',topic:'as_is',type:'fillin',question:'What is the English term for the target state of architecture?',correct:['to-be','To-Be','to be'],explanation:'To-Be = target/future state of the architecture.'},
{id:'m3_36',topic:'arch_def',type:'single',question:'A Data Architect\'s role includes:',options:['Writing SQL queries daily','Designing and maintaining the data architecture','Managing helpdesk tickets','Running marketing campaigns'],correct:1,explanation:'Data Architect = designs, maintains, and evolves the data architecture.'},
{id:'m3_37',topic:'artifacts',type:'single',question:'DFD and ERD are:',options:['The same diagram','Different diagrams: DFD=data flows, ERD=entity relationships','Both about server architecture','Neither about data'],correct:1,explanation:'DFD = data movement. ERD = data structure/entities. Different purposes.'},
{id:'m3_38',topic:'frameworks',type:'single',question:'Data Architecture and Data Governance relate as:',options:['Unrelated','Governance sets rules, Architecture defines structure','Architecture replaces Governance','They are the same'],correct:1,explanation:'Governance = rules/policies. Architecture = structure/flows. Complementary.'},
{id:'m3_39',topic:'arch_def',type:'single',question:'Technology Architecture covers:',options:['Business strategy','Data flows','Infrastructure and platforms','Data quality'],correct:2,explanation:'Technology Architecture = infrastructure, platforms, technical capabilities.'},
{id:'m3_40',topic:'artifacts',type:'single',question:'SSOT addresses the problem of:',options:['Slow queries','Multiple conflicting versions of the same data','Insufficient storage','Network latency'],correct:1,explanation:'SSOT eliminates confusion from multiple contradictory copies of data.'},
{id:'m3_41',topic:'as_is',type:'single',question:'Starting architecture work without understanding As-Is leads to:',options:['Faster results','Unrealistic target architecture','Better quality','Lower costs'],correct:1,explanation:'Without As-Is understanding, To-Be architecture is disconnected from reality.'},
{id:'m3_42',topic:'frameworks',type:'single',question:'Shadow IT creates problems for architecture because:',options:['It uses better technology','It creates uncontrolled data silos and redundancy','It is always more secure','It reduces costs'],correct:1,explanation:'Shadow IT = uncontrolled systems creating unknown data silos.'},
{id:'m3_43',topic:'arch_def',type:'fillin',question:'What English term means excessive duplication of data?',correct:['data redundancy','Data Redundancy'],explanation:'Data Redundancy = unnecessary duplication of data across systems.'},
{id:'m3_44',topic:'artifacts',type:'single',question:'A BA uses architecture artifacts to:',options:['Write ETL code','Understand data landscape for correct requirements analysis','Configure servers','Design logos'],correct:1,explanation:'BA reads architecture artifacts to understand data sources, flows, and ownership.'},
{id:'m3_45',topic:'as_is',type:'truefalse',question:'A Roadmap contains only the final target state without phases.',options:['True','False'],correct:1,explanation:'False. Roadmap includes phases, priorities, dependencies — the transition plan.'},
{id:'m3_46',topic:'frameworks',type:'single',question:'Technical Debt should be:',options:['Ignored','Addressed and reduced through architectural planning','Increased','Automated'],correct:1,explanation:'Architecture planning should address and reduce technical debt over time.'},
{id:'m3_47',topic:'arch_def',type:'single',question:'Data Architecture is connected to ALL other DAMA areas because:',options:['It is the most expensive','It defines the data structure that all areas depend on','It replaces them','It is the oldest area'],correct:1,explanation:'All DAMA areas depend on the data structure that architecture defines.'},
{id:'m3_48',topic:'artifacts',type:'truefalse',question:'Data Catalog is a dynamic, living document, not a one-time inventory.',options:['True','False'],correct:0,explanation:'True. Catalog should be maintained and updated as data assets change.'},
{id:'m3_49',topic:'as_is',type:'single',question:'Roadmap priorities should be driven by:',options:['Personal preferences','Business value and strategic alignment','Alphabetical order','Technology trends only'],correct:1,explanation:'Roadmap priorities = business value + strategic alignment + risk reduction.'},
{id:'m3_50',topic:'frameworks',type:'single',question:'The Zachman Framework organizes architecture knowledge using:',options:['A 2×2 matrix','A 6×6 matrix of questions and perspectives','A single list','A pie chart'],correct:1,explanation:'Zachman = 6 questions × 6 perspectives (scope, business, system, technology, components, operations).'},
{id:'m3_51',topic:'arch_def',type:'single',question:'An organization without Data Architecture typically suffers from:',options:['Too much clarity','Data silos, redundancy, and integration challenges','Excessive documentation','Over-governed data'],correct:1,explanation:'Without architecture: silos, redundancy, unclear data flows, integration difficulties.'},
{id:'m3_52',topic:'artifacts',type:'single',question:'Which artifact provides a single-page overview of major data domains?',options:['PDM','Subject Area Model','Index page','Git log'],correct:1,explanation:'Subject Area Model = high-level, single-page view of major data domains.'},
{id:'m3_53',topic:'as_is',type:'single',question:'Gap analysis in architecture compares:',options:['Two database vendors','As-Is state with To-Be state','Two programming languages','Employee counts'],correct:1,explanation:'Gap analysis = comparing current (As-Is) and target (To-Be) to identify gaps.'},
{id:'m3_54',topic:'frameworks',type:'fillin',question:'What is the most widely used Enterprise Architecture framework?',correct:['TOGAF','togaf'],explanation:'TOGAF = The Open Group Architecture Framework — most widely adopted.'},
{id:'m3_55',topic:'arch_def',type:'multiple',question:'Which are domains of Enterprise Architecture?',options:['Business','Data','Application','Marketing','Technology'],correct:[0,1,2,4],explanation:'EA = Business + Data + Application + Technology. Marketing is not an EA domain.'},
{id:'m3_56',topic:'artifacts',type:'single',question:'To find where customer data originates, a BA should consult:',options:['CRUD Matrix or DFD','Employee directory','Marketing plan','Financial statements'],correct:0,explanation:'CRUD Matrix or DFD shows data origins, flows, and consumers.'},
{id:'m3_57',topic:'as_is',type:'single',question:'A well-defined Roadmap reduces risk by:',options:['Eliminating all change','Providing clear phases and dependencies','Avoiding documentation','Skipping testing'],correct:1,explanation:'Roadmap = clear phases, dependencies, and prioritization = reduced risk.'},
{id:'m3_58',topic:'frameworks',type:'single',question:'Which is an architecture challenge, NOT a governance challenge?',options:['Policy compliance','Data silos and integration complexity','Accountability assignment','Decision rights'],correct:1,explanation:'Data silos and integration = architecture challenges. Accountability/decisions = governance.'},
{id:'m3_59',topic:'arch_def',type:'single',question:'Data Architecture should align with:',options:['Only IT strategy','Business strategy of the organization','Only financial plan','Personal preferences of the CTO'],correct:1,explanation:'Data Architecture must align with the overall business strategy.'},
{id:'m3_60',topic:'artifacts',type:'single',question:'SSOT prevents:',options:['Data from being used','Conflicting versions of the same data element','Data from being backed up','Systems from communicating'],correct:1,explanation:'SSOT = one authoritative source, preventing conflicting copies.'},
],
m4: [
{id:'m4_01',topic:'basics',type:'single',question:'Data Modeling creates:',options:['Network diagrams','Visual representations of data structures','Marketing plans','Budget forecasts'],correct:1,explanation:'Data Modeling = creating visual representations of data structures.'},
{id:'m4_02',topic:'basics',type:'single',question:'An Entity in a data model represents:',options:['A database server','A real-world object about which data is stored','A network connection','A user interface element'],correct:1,explanation:'Entity = real-world object (customer, order, product) in a data model.'},
{id:'m4_03',topic:'basics',type:'single',question:'Attributes describe:',options:['Server specifications','Characteristics of an entity','Network protocols','Programming languages'],correct:1,explanation:'Attributes = properties/characteristics of an entity (name, date, price).'},
{id:'m4_04',topic:'basics',type:'single',question:'A Constraint in data modeling is:',options:['A hardware limitation','A data integrity rule','A budget restriction','A time zone'],correct:1,explanation:'Constraint = integrity rule (uniqueness, NOT NULL, valid ranges).'},
{id:'m4_05',topic:'cdm_ldm_pdm',type:'single',question:'CDM is designed for:',options:['DBAs','Business stakeholders','Network engineers','System administrators'],correct:1,explanation:'CDM = Conceptual Data Model — high-level, for business audience.'},
{id:'m4_06',topic:'cdm_ldm_pdm',type:'single',question:'LDM includes:',options:['Only entity names','Full attributes, keys, and business rules without DBMS specifics','Physical indexes and partitions','Only relationships'],correct:1,explanation:'LDM = detailed model with attributes, keys, rules — but DBMS-independent.'},
{id:'m4_07',topic:'cdm_ldm_pdm',type:'single',question:'PDM is tied to:',options:['Business strategy','A specific DBMS','Marketing goals','No technology'],correct:1,explanation:'PDM = Physical Data Model — optimized for a specific DBMS.'},
{id:'m4_08',topic:'cdm_ldm_pdm',type:'truefalse',question:'Skipping the CDM and going directly to PDM is recommended.',options:['True','False'],correct:1,explanation:'False. Skipping CDM risks building a system that stores the wrong data.'},
{id:'m4_09',topic:'cdm_ldm_pdm',type:'fillin',question:'What does PDM stand for?',correct:['physical data model','Physical Data Model'],explanation:'PDM = Physical Data Model.'},
{id:'m4_10',topic:'relationships',type:'single',question:'The MOST common relationship type in data models is:',options:['One-to-One','One-to-Many','Many-to-Many','None'],correct:1,explanation:'1:M (One-to-Many) = most frequently occurring relationship type.'},
{id:'m4_11',topic:'relationships',type:'single',question:'Many-to-Many relationships are implemented using:',options:['Foreign keys alone','A junction/associative table','Triggers','Views'],correct:1,explanation:'M:M = resolved through an intermediate (junction/associative) table.'},
{id:'m4_12',topic:'relationships',type:'single',question:'A Foreign Key references:',options:['Any attribute','The Primary Key of another entity','A file path','A URL'],correct:1,explanation:'FK = reference to the PK of another entity, implementing a relationship.'},
{id:'m4_13',topic:'relationships',type:'single',question:'A Surrogate Key is:',options:['Based on real business data','An artificial system-generated identifier','Always a UUID','A foreign key'],correct:1,explanation:'Surrogate Key = system-generated (e.g., auto-increment ID), not from business data.'},
{id:'m4_14',topic:'relationships',type:'single',question:'Natural Key is based on:',options:['Random numbers','Real-world business data (e.g., tax ID, email)','Auto-increment','Hash functions'],correct:1,explanation:'Natural Key = derived from actual business data like tax ID or email.'},
{id:'m4_15',topic:'normalization',type:'single',question:'1NF requires:',options:['No foreign keys','Atomic (indivisible) values in every field','Full denormalization','Only numeric data'],correct:1,explanation:'1NF = atomicity: each field contains one indivisible value.'},
{id:'m4_16',topic:'normalization',type:'single',question:'3NF eliminates:',options:['All relationships','Transitive dependencies among non-key attributes','Primary keys','All indexes'],correct:1,explanation:'3NF = 2NF + no transitive dependencies between non-key attributes.'},
{id:'m4_17',topic:'normalization',type:'single',question:'Denormalization is typically applied in:',options:['OLTP systems','OLAP/analytical systems','Both equally','Neither'],correct:1,explanation:'Denormalization = common in OLAP for faster reads. OLTP stays normalized.'},
{id:'m4_18',topic:'normalization',type:'single',question:'Denormalization risks:',options:['Better data integrity','Update anomalies','Faster writes','More normal forms'],correct:1,explanation:'Denormalization = risk of update anomalies (changes needed in multiple places).'},
{id:'m4_19',topic:'normalization',type:'truefalse',question:'OLTP systems are typically normalized to 3NF.',options:['True','False'],correct:0,explanation:'True. OLTP = normalized (3NF) for integrity and efficient writes.'},
{id:'m4_20',topic:'schemas',type:'single',question:'In Star Schema, the central table is:',options:['Dimension Table','Fact Table','Lookup Table','Bridge Table'],correct:1,explanation:'Star Schema = Fact Table (center) + Dimension Tables (surrounding).'},
{id:'m4_21',topic:'schemas',type:'single',question:'Snowflake Schema differs from Star by:',options:['Having no fact table','Normalizing dimension tables','Being faster for all queries','Using no keys'],correct:1,explanation:'Snowflake = Star + normalized dimension tables.'},
{id:'m4_22',topic:'schemas',type:'single',question:'Fact Table contains:',options:['Descriptive attributes','Numeric metrics/measures','Configuration settings','User preferences'],correct:1,explanation:'Fact Table = numeric measures (amounts, counts, quantities).'},
{id:'m4_23',topic:'schemas',type:'single',question:'Dimension Table contains:',options:['Numeric metrics only','Descriptive attributes (who, what, when, where)','Server logs','Application code'],correct:1,explanation:'Dimension Table = descriptive context for analysis (who, what, when, where).'},
{id:'m4_24',topic:'schemas',type:'single',question:'IE notation uses the crow\'s foot symbol to represent:',options:['One','Many','Optional','Mandatory'],correct:1,explanation:'Crow\'s foot (воронья лапка) = "many" side of a relationship.'},
{id:'m4_25',topic:'basics',type:'single',question:'A Relationship in a data model represents:',options:['A database connection string','An association between entities','A user role','A file format'],correct:1,explanation:'Relationship = association between entities (e.g., customer places order).'},
{id:'m4_26',topic:'cdm_ldm_pdm',type:'matching',question:'Match model levels to audiences:',pairs:[{left:'CDM'},{left:'LDM'},{left:'PDM'}],rightOptions:['Business stakeholders','Business + IT','IT / DBA'],correct:[0,1,2],explanation:'CDM=business, LDM=business+IT, PDM=IT/DBA.'},
{id:'m4_27',topic:'relationships',type:'fillin',question:'What type of key is an auto-increment ID?',correct:['surrogate','Surrogate','surrogate key','Surrogate Key'],explanation:'Surrogate Key = artificial system-generated identifier.'},
{id:'m4_28',topic:'normalization',type:'single',question:'2NF requires full dependency on:',options:['Any attribute','The entire primary key','Foreign keys only','No key'],correct:1,explanation:'2NF = every non-key attribute fully depends on the entire PK (not part of it).'},
{id:'m4_29',topic:'schemas',type:'truefalse',question:'In Star Schema, dimension tables are denormalized.',options:['True','False'],correct:0,explanation:'True. Star Schema dimensions are denormalized for simplicity and speed.'},
{id:'m4_30',topic:'basics',type:'truefalse',question:'Data models serve as a communication tool between business and IT.',options:['True','False'],correct:0,explanation:'True. Models create shared understanding of data structures.'},
{id:'m4_31',topic:'cdm_ldm_pdm',type:'single',question:'Which model level first introduces data types and indexes?',options:['CDM','LDM','PDM','None of them'],correct:2,explanation:'PDM = physical level with data types, indexes, partitions.'},
{id:'m4_32',topic:'relationships',type:'single',question:'Cardinality describes:',options:['Data volume','Quantitative relationship between entities (1:1, 1:M, M:M)','Server count','Query speed'],correct:1,explanation:'Cardinality = type of relationship: one-to-one, one-to-many, many-to-many.'},
{id:'m4_33',topic:'normalization',type:'single',question:'A phone number field containing "555-1234, 555-5678" violates:',options:['3NF','2NF','1NF','No form'],correct:2,explanation:'Multiple values in one field = violation of 1NF (atomicity).'},
{id:'m4_34',topic:'schemas',type:'single',question:'UML in data modeling stands for:',options:['Universal Machine Language','Unified Modeling Language','User Management Layer','Unique Model Library'],correct:1,explanation:'UML = Unified Modeling Language — used for class diagrams.'},
{id:'m4_35',topic:'basics',type:'single',question:'Optionality in relationships indicates:',options:['Data types','Whether the relationship is mandatory or optional','Performance levels','Security levels'],correct:1,explanation:'Optionality = mandatory (must exist) vs optional (may not exist).'},
{id:'m4_36',topic:'cdm_ldm_pdm',type:'single',question:'LDM is typically:',options:['Denormalized','Normalized','Tied to a specific DBMS','Has no attributes'],correct:1,explanation:'LDM is usually normalized, without DBMS-specific details.'},
{id:'m4_37',topic:'relationships',type:'single',question:'PK stands for:',options:['Private Key','Primary Key','Public Key','Process Key'],correct:1,explanation:'PK = Primary Key = unique identifier for each record.'},
{id:'m4_38',topic:'normalization',type:'fillin',question:'What process intentionally violates normal forms for read performance?',correct:['denormalization','Denormalization'],explanation:'Denormalization = intentional NF violation to speed up read queries.'},
{id:'m4_39',topic:'schemas',type:'single',question:'IDEF1X is:',options:['A programming language','A data modeling standard from NIST','A database','A cloud service'],correct:1,explanation:'IDEF1X = NIST standard for data modeling.'},
{id:'m4_40',topic:'basics',type:'single',question:'Data modeling helps BA primarily by:',options:['Replacing requirements','Documenting data requirements and creating shared understanding','Automating testing','Designing UIs'],correct:1,explanation:'Modeling = key BA tool for documenting data requirements.'},
{id:'m4_41',topic:'cdm_ldm_pdm',type:'single',question:'CDM typically contains:',options:['Indexes and data types','Only key entities and relationships','SQL scripts','Server configurations'],correct:1,explanation:'CDM = high-level: key entities and relationships only.'},
{id:'m4_42',topic:'relationships',type:'single',question:'1:1 relationship example:',options:['Customer → Orders','Employee ↔ Workstation','Student ↔ Courses','Product → Reviews'],correct:1,explanation:'One employee has exactly one workstation = 1:1.'},
{id:'m4_43',topic:'normalization',type:'single',question:'Which normal form is minimum for most OLTP systems?',options:['1NF','2NF','3NF','5NF'],correct:2,explanation:'3NF = minimum standard for most transactional systems.'},
{id:'m4_44',topic:'schemas',type:'single',question:'In Snowflake Schema, normalization of dimensions:',options:['Simplifies queries','Saves space but makes queries more complex','Speeds up all operations','Removes all joins'],correct:1,explanation:'Normalized dimensions = less redundancy but more joins = complex queries.'},
{id:'m4_45',topic:'basics',type:'single',question:'Which is NOT an element of a data model?',options:['Entity','Attribute','Relationship','Firewall'],correct:3,explanation:'Firewall = security device, not a data modeling element.'},
{id:'m4_46',topic:'cdm_ldm_pdm',type:'truefalse',question:'LDM is tied to a specific DBMS like Oracle or PostgreSQL.',options:['True','False'],correct:1,explanation:'False. LDM is DBMS-independent. Only PDM is tied to a specific DBMS.'},
{id:'m4_47',topic:'relationships',type:'single',question:'An associative/junction table resolves:',options:['1:1 relationships','M:M relationships','Performance issues','Security problems'],correct:1,explanation:'Junction table = bridge entity that resolves M:M into two 1:M relationships.'},
{id:'m4_48',topic:'normalization',type:'single',question:'Transitive dependency means:',options:['A depends on B directly','A non-key attribute depends on another non-key attribute','All attributes depend on PK','No dependencies exist'],correct:1,explanation:'Transitive dependency = A→B→C, where C depends on A through B (both non-key).'},
{id:'m4_49',topic:'schemas',type:'single',question:'Which notation is MOST widely used for data modeling?',options:['BPMN','UML','IE (Information Engineering)','Flowchart'],correct:2,explanation:'IE with crow\'s foot notation = most widely used for data modeling.'},
{id:'m4_50',topic:'basics',type:'fillin',question:'What is the English term for the visual representation of data structure?',correct:['data model','Data Model'],explanation:'Data Model = visual/formal representation of data structure.'},
{id:'m4_51',topic:'cdm_ldm_pdm',type:'single',question:'Going CDM → LDM → PDM is called:',options:['Reverse engineering','Forward engineering / progressive refinement','Data mining','ETL'],correct:1,explanation:'CDM→LDM→PDM = progressive refinement / forward engineering.'},
{id:'m4_52',topic:'relationships',type:'truefalse',question:'One-to-Many is the most common relationship type.',options:['True','False'],correct:0,explanation:'True. 1:M is by far the most common relationship in data models.'},
{id:'m4_53',topic:'normalization',type:'single',question:'OLAP systems use denormalization because:',options:['They need maximum write speed','Read-heavy queries benefit from fewer joins','They store less data','They have no users'],correct:1,explanation:'OLAP = read-heavy. Denormalization reduces joins = faster analytical queries.'},
{id:'m4_54',topic:'schemas',type:'single',question:'A Fact Table typically contains:',options:['Only text descriptions','Foreign keys to dimensions + numeric measures','Only primary keys','Application settings'],correct:1,explanation:'Fact Table = FKs to dimension tables + numeric measures (amounts, counts).'},
{id:'m4_55',topic:'basics',type:'single',question:'Entity-Relationship Diagram (ERD) is used to:',options:['Monitor servers','Visualize entities, attributes, and relationships','Track user sessions','Configure networks'],correct:1,explanation:'ERD = visual representation of entities and their relationships.'},
{id:'m4_56',topic:'relationships',type:'single',question:'Natural Key risk: if business data changes (e.g., name change), the key:',options:['Remains stable','May need to change, causing cascading updates','Automatically adapts','Is unaffected'],correct:1,explanation:'Natural Keys can change with business data, causing cascading updates.'},
{id:'m4_57',topic:'normalization',type:'truefalse',question:'Denormalization in OLTP systems is generally recommended.',options:['True','False'],correct:1,explanation:'False. OLTP should stay normalized. Denormalization = for OLAP/analytical.'},
{id:'m4_58',topic:'schemas',type:'single',question:'The "star" in Star Schema comes from:',options:['A rating system','The visual shape: central fact table with radiating dimensions','A company logo','Star-shaped servers'],correct:1,explanation:'The visual pattern of a central table with surrounding tables looks like a star.'},
{id:'m4_59',topic:'cdm_ldm_pdm',type:'single',question:'Which model should be shared with business stakeholders for validation?',options:['PDM','LDM','CDM','Deployment diagram'],correct:2,explanation:'CDM = designed for business stakeholders to validate data requirements.'},
{id:'m4_60',topic:'schemas',type:'fillin',question:'What schema type has normalized dimension tables?',correct:['snowflake','Snowflake','snowflake schema','Snowflake Schema'],explanation:'Snowflake Schema = Star + normalized dimension tables.'},

m5: [
{id:'m5_01',topic:'storage_overview',type:'single',question:'Data Storage and Operations covers:',options:['Only backups','Design, management, and support of stored data','Only cloud storage','Only database design'],correct:1,explanation:'This area covers the full spectrum: design, management, and support of stored data.'},
{id:'m5_02',topic:'storage_overview',type:'single',question:'DBA stands for:',options:['Data Business Analyst','Database Administrator','Digital Backup Agent','Data Board Advisor'],correct:1,explanation:'DBA = Database Administrator — manages DBMS installations, performance, and maintenance.'},
{id:'m5_03',topic:'storage_overview',type:'single',question:'Data Engineer PRIMARILY works on:',options:['Business strategy','Data pipelines — moving and transforming data','UI design','Marketing'],correct:1,explanation:'Data Engineer = designs and maintains data pipelines (movement and transformation).'},
{id:'m5_04',topic:'dbms',type:'single',question:'RDBMS stores data in:',options:['Documents','Tables with rows and columns','Key-value pairs','Graph nodes'],correct:1,explanation:'RDBMS = Relational DBMS = data stored in tables (rows and columns).'},
{id:'m5_05',topic:'dbms',type:'single',question:'Which ACID property ensures "all or nothing" transactions?',options:['Atomicity','Consistency','Isolation','Durability'],correct:0,explanation:'Atomicity = transaction is indivisible: all changes apply or none do.'},
{id:'m5_06',topic:'dbms',type:'single',question:'Consistency in ACID means:',options:['Data is always the same','Transaction moves DB from one valid state to another','All copies are identical','Data never changes'],correct:1,explanation:'Consistency = transaction maintains database validity constraints.'},
{id:'m5_07',topic:'dbms',type:'single',question:'Isolation in ACID ensures:',options:['Data is encrypted','Concurrent transactions do not interfere','Database is offline','Data cannot be shared'],correct:1,explanation:'Isolation = concurrent transactions operate independently.'},
{id:'m5_08',topic:'dbms',type:'single',question:'Durability guarantees:',options:['Data is temporary','Committed data persists even after system failure','Data is always fast','Data is always encrypted'],correct:1,explanation:'Durability = after commit, data survives system crashes.'},
{id:'m5_09',topic:'dbms',type:'fillin',question:'What does ACID stand for?',correct:['atomicity consistency isolation durability','Atomicity Consistency Isolation Durability'],explanation:'ACID = Atomicity, Consistency, Isolation, Durability.'},
{id:'m5_10',topic:'dbms',type:'matching',question:'Match NoSQL types to examples:',pairs:[{left:'Document store'},{left:'Key-Value'},{left:'Graph DB'},{left:'Column-family'}],rightOptions:['MongoDB','Redis','Neo4j','Cassandra'],correct:[0,1,2,3],explanation:'MongoDB=document, Redis=KV, Neo4j=graph, Cassandra=column-family.'},
{id:'m5_11',topic:'dbms',type:'single',question:'Which NoSQL type is BEST for social network relationships?',options:['Key-Value','Document store','Graph database','Column-family'],correct:2,explanation:'Graph databases excel at storing and traversing relationships.'},
{id:'m5_12',topic:'dbms',type:'single',question:'MongoDB is a:',options:['RDBMS','Document store','Graph database','Key-Value store'],correct:1,explanation:'MongoDB stores data as JSON-like documents.'},
{id:'m5_13',topic:'dbms',type:'single',question:'Redis is BEST described as:',options:['RDBMS','Key-Value store','Document database','Column-family store'],correct:1,explanation:'Redis = in-memory Key-Value store.'},
{id:'m5_14',topic:'oltp_olap',type:'single',question:'OLTP systems are designed for:',options:['Complex analytical queries','High-volume transactional processing','Data warehousing','Machine learning'],correct:1,explanation:'OLTP = Online Transaction Processing — many short, concurrent transactions.'},
{id:'m5_15',topic:'oltp_olap',type:'single',question:'OLAP systems store:',options:['Only current data','Historical data for analysis','Only metadata','Only logs'],correct:1,explanation:'OLAP = analytical systems with historical data.'},
{id:'m5_16',topic:'oltp_olap',type:'single',question:'CRM and ERP are examples of:',options:['OLAP','OLTP','NoSQL','Graph databases'],correct:1,explanation:'CRM and ERP = transactional (OLTP) systems.'},
{id:'m5_17',topic:'oltp_olap',type:'truefalse',question:'OLTP and OLAP workloads can be effectively combined in one system.',options:['True','False'],correct:1,explanation:'False. Transactional and analytical workloads conflict and should be separated.'},
{id:'m5_18',topic:'backup',type:'single',question:'Full Backup copies:',options:['Only changes','All data completely','Only metadata','Only indexes'],correct:1,explanation:'Full Backup = complete copy of all data.'},
{id:'m5_19',topic:'backup',type:'single',question:'Incremental Backup copies:',options:['All data','Changes since the last backup of any type','Changes since the last full backup','Only deleted data'],correct:1,explanation:'Incremental = changes since the last backup (any type).'},
{id:'m5_20',topic:'backup',type:'single',question:'Differential Backup copies:',options:['All data','Changes since the last full backup','Changes since the last incremental','Only indexes'],correct:1,explanation:'Differential = changes since the last FULL backup (not any backup).'},
{id:'m5_21',topic:'backup',type:'single',question:'RPO = 0 means:',options:['No backups needed','Zero data loss is acceptable','Recovery is instant','Data is not important'],correct:1,explanation:'RPO=0 = zero tolerance for data loss. Requires synchronous replication.'},
{id:'m5_22',topic:'backup',type:'single',question:'RTO = 30 minutes means:',options:['Data can be 30 minutes old','System must recover within 30 minutes','Backups run every 30 minutes','Data is stored for 30 minutes'],correct:1,explanation:'RTO = maximum acceptable downtime for recovery.'},
{id:'m5_23',topic:'backup',type:'fillin',question:'What does RPO stand for?',correct:['recovery point objective','Recovery Point Objective'],explanation:'RPO = Recovery Point Objective = maximum acceptable data loss.'},
{id:'m5_24',topic:'backup',type:'fillin',question:'What does RTO stand for?',correct:['recovery time objective','Recovery Time Objective'],explanation:'RTO = Recovery Time Objective = maximum acceptable recovery time.'},
{id:'m5_25',topic:'cloud',type:'single',question:'IaaS provides:',options:['Ready-made software','Infrastructure rental (servers, storage)','Platform for development','Database as a service'],correct:1,explanation:'IaaS = Infrastructure as a Service.'},
{id:'m5_26',topic:'cloud',type:'single',question:'SaaS provides:',options:['Raw infrastructure','Development platform','Ready-made software as a service','Only databases'],correct:2,explanation:'SaaS = Software as a Service.'},
{id:'m5_27',topic:'cloud',type:'single',question:'DBaaS is:',options:['A NoSQL type','Database as a cloud service','A backup method','A programming language'],correct:1,explanation:'DBaaS = Database as a Service — managed database in the cloud.'},
{id:'m5_28',topic:'cloud',type:'single',question:'Data Virtualization:',options:['Physically moves all data','Creates a virtual access layer without moving data','Deletes original data','Encrypts everything'],correct:1,explanation:'Virtualization = virtual layer over multiple sources WITHOUT physical movement.'},
{id:'m5_29',topic:'cloud',type:'truefalse',question:'Data Virtualization requires copying data to a central location.',options:['True','False'],correct:1,explanation:'False. Virtualization provides unified access WITHOUT copying/moving data.'},
{id:'m5_30',topic:'storage_overview',type:'single',question:'DBMS stands for:',options:['Data Business Management System','Database Management System','Digital Backup Monitoring Service','Data Bridge Migration System'],correct:1,explanation:'DBMS = Database Management System.'},
{id:'m5_31',topic:'dbms',type:'single',question:'SQL stands for:',options:['System Query Logic','Structured Query Language','Standard Question Library','Simple Query List'],correct:1,explanation:'SQL = Structured Query Language.'},
{id:'m5_32',topic:'dbms',type:'single',question:'Cassandra is a:',options:['RDBMS','Column-family NoSQL store','Graph database','Document store'],correct:1,explanation:'Cassandra = column-family (wide-column) NoSQL database.'},
{id:'m5_33',topic:'oltp_olap',type:'single',question:'OLAP stands for:',options:['Online Application Platform','Online Analytical Processing','Offline Local Access Protocol','Open Linked Archive Platform'],correct:1,explanation:'OLAP = Online Analytical Processing.'},
{id:'m5_34',topic:'oltp_olap',type:'single',question:'OLTP stands for:',options:['Online Transaction Processing','Offline Transfer Protocol','Open Link Technology Platform','Online Testing Process'],correct:0,explanation:'OLTP = Online Transaction Processing.'},
{id:'m5_35',topic:'backup',type:'single',question:'SLA stands for:',options:['System Login Access','Service Level Agreement','Standard Language API','Secure Link Architecture'],correct:1,explanation:'SLA = Service Level Agreement.'},
{id:'m5_36',topic:'backup',type:'single',question:'A BA should collect RPO and RTO as:',options:['Functional requirements','Non-functional requirements','Design specifications','Test cases'],correct:1,explanation:'RPO and RTO = non-functional requirements for availability and recovery.'},
{id:'m5_37',topic:'cloud',type:'single',question:'PaaS provides:',options:['Raw servers only','A platform for development and deployment','Complete applications','Only storage'],correct:1,explanation:'PaaS = Platform as a Service — development and deployment platform.'},
{id:'m5_38',topic:'dbms',type:'truefalse',question:'RDBMS typically support ACID transactions.',options:['True','False'],correct:0,explanation:'True. ACID is a fundamental property of relational databases.'},

// ===================== ENGINE =====================
const MODULE_TEST_SIZE = 50;
const FINAL_TEST_SIZE = 100;

let state = { userName:'', currentPage:'home', quizAnswers:{}, attempts:{}, activeQuizzes:{}, finalTestResult:null };

function loadState(){ try { const s=localStorage.getItem('dama2_state'); if(s) state={...state,...JSON.parse(s)}; } catch(e){} }
function saveState(){ try { localStorage.setItem('dama2_state',JSON.stringify(state)); } catch(e){} }

// Shuffle array (Fisher-Yates)
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// Generate quiz from bank with balanced topic coverage
function generateQuiz(bank, size){
  const byTopic={};
  bank.forEach(q=>{ if(!byTopic[q.topic]) byTopic[q.topic]=[]; byTopic[q.topic].push(q); });
  const topics=Object.keys(byTopic);
  const perTopic=Math.ceil(size/topics.length);
  let selected=[];
  topics.forEach(t=>{ selected.push(...shuffle(byTopic[t]).slice(0,perTopic)); });
  selected=shuffle(selected).slice(0,size);
  return selected.map(q=>shuffleQuestion(q));
}

// Shuffle answer options within a question
function shuffleQuestion(q){
  if(q.type==='matching'||q.type==='fillin') return {...q};
  const indices=q.options.map((_,i)=>i);
  const shuf=shuffle(indices);
  const newOpts=shuf.map(i=>q.options[i]);
  let newCorrect;
  if(q.type==='multiple'){ newCorrect=q.correct.map(c=>shuf.indexOf(c)); }
  else { newCorrect=shuf.indexOf(q.correct); }
  return {...q, options:newOpts, correct:newCorrect, _map:shuf};
}

function getModulePct(modId){
  const atts=state.attempts[modId]||[];
  if(atts.length===0) return 0;
  return atts[atts.length-1].score;
}

function getOverallPct(){
  if(!MODULES.length) return 0;
  let t=0; MODULES.forEach(m=>t+=getModulePct(m.id));
  return Math.round(t/MODULES.length);
}

// ===================== RENDERING =====================
function renderSidebar(){
  const sb=document.getElementById('sidebar');
  let h='<div class="sb-header"><div class="sb-logo"><div class="sb-logo-icon">D</div>DAMA DMBOK</div><div class="sb-subtitle">Self-Study Course</div></div>';
  h+='<div class="nav-group"><div class="nav-group-label">Navigation</div>';
  h+=navBtn('home','Home');
  h+='</div><div class="nav-group"><div class="nav-group-label">Modules</div>';
  MODULES.forEach(m=>{
    const pct=getModulePct(m.id);
    const badge=pct>=80?'<span class="nav-badge done">'+pct+'%</span>':pct>0?'<span class="nav-badge progress">'+pct+'%</span>':'';
    h+=navBtn('mod_'+m.id, m.title, badge);
  });
  h+='</div><div class="nav-group"><div class="nav-group-label">Assessment</div>';
  h+=navBtn('final','Final Assessment');
  h+=navBtn('glossary','Glossary');
  h+=navBtn('results','Results');
  h+='</div>';
  sb.innerHTML=h;
}

function navBtn(page,label,extra=''){
  return `<button class="nav-item${state.currentPage===page?' active':''}" onclick="navigate('${page}')">${label}${extra}</button>`;
}

function navigate(p){ state.currentPage=p; saveState(); render(); document.querySelector('.sidebar').classList.remove('open'); window.scrollTo(0,0); }

function render(){
  renderSidebar();
  const pct=getOverallPct();
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('topbar-title').textContent='DAMA DMBOK — '+pct+'% complete';
  const c=document.getElementById('content');
  const p=state.currentPage;
  if(p==='home') return renderHome(c);
  if(p==='glossary') return renderGlossary(c);
  if(p==='results') return renderResults(c);
  if(p==='final') return renderFinal(c);
  if(p.startsWith('mod_')) return renderModule(c,p.replace('mod_',''));
  c.innerHTML='<div class="card"><h2>Page not found</h2></div>';
}

function renderHome(c){
  let h='<div class="home-hero"><h1>DAMA DMBOK for Business Analysts</h1><p>Interactive self-study course. Learn data management concepts, test your knowledge, and track your progress.</p></div>';
  h+='<div class="card"><h3>Your Profile</h3><input class="input" value="'+esc(state.userName)+'" onchange="state.userName=this.value;saveState()" placeholder="Enter your name for reports"><div class="info-block" style="margin-top:12px"><strong>Pass threshold:</strong> 80% on each module test and the final assessment.</div></div>';
  h+='<div class="home-grid">';
  MODULES.forEach(m=>{
    const pct=getModulePct(m.id); const bank=BANKS[m.id]||[];
    h+=`<div class="home-card" onclick="navigate('mod_${m.id}')"><h3>${m.title}</h3><p>${m.chapter} &middot; ${bank.length} questions in bank</p><div class="mc-bar"><div class="mc-fill" style="width:${pct}%"></div></div><p style="margin-top:4px;font-size:11px;color:var(--text-muted)">${pct>0?pct+'% best score':'Not attempted'}</p></div>`;
  });
  h+=`<div class="home-card" onclick="navigate('final')"><h3>Final Assessment</h3><p>${FINAL_BANK.length} questions in bank &middot; ${FINAL_TEST_SIZE} per attempt</p>${state.finalTestResult!==null?`<p style="margin-top:8px;font-weight:700;color:${state.finalTestResult>=80?'var(--success)':'var(--danger)'}">Best: ${state.finalTestResult}%</p>`:''}</div>`;
  h+='</div>';
  c.innerHTML=h;
}

function renderModule(c,modId){
  const mod=MODULES.find(m=>m.id===modId);
  if(!mod){c.innerHTML='<div class="card">Module not found</div>';return;}
  let h=`<div class="card"><span class="tag tag-accent">${mod.chapter}</span><h2>${mod.title}</h2>`;
  if(mod.objectives){h+='<h3>Learning Objectives</h3><ul>';mod.objectives.forEach(o=>h+=`<li>${o}</li>`);h+='</ul>';}
  h+='</div>';
  mod.sections?.forEach((sec,si)=>{
    h+=`<div class="card"><h3>${sec.title}</h3>${sec.content}`;
    if(sec.checkQuestions?.length){
      h+=renderInlineQuiz(sec.checkQuestions,`${modId}_s${si}`);
    }
    h+='</div>';
  });
  // Module test
  const bank=BANKS[modId]||[];
  if(bank.length){
    h+=`<div class="card"><h2>Module Test: ${mod.title}</h2>`;
    h+=`<p><span class="tag tag-primary">${bank.length} questions in bank</span> <span class="tag tag-accent">${MODULE_TEST_SIZE} per attempt</span></p>`;
    const active=state.activeQuizzes[modId];
    if(active && !active.finished){
      h+=renderActiveQuiz(active,modId);
    } else {
      h+=`<div class="test-start"><div class="icon">📝</div><h3>Ready to test your knowledge?</h3>
<p>${MODULE_TEST_SIZE} questions will be randomly selected from a pool of ${bank.length}.<br>Each attempt uses a different set. Pass threshold: 80%.</p>
<button class="btn btn-primary btn-lg" onclick="startModuleTest('${modId}')">Start Test</button></div>`;
      const atts=state.attempts[modId]||[];
      if(atts.length){
        h+='<div class="attempt-history"><h4>Previous Attempts</h4>';
        atts.forEach((a,i)=>{ h+=`<div class="attempt-row"><span>Attempt ${i+1} — ${new Date(a.date).toLocaleString()}</span><span class="score" style="color:${a.score>=80?'var(--success)':'var(--danger)'};">${a.score}% (${a.correct}/${a.total})</span></div>`; });
        h+='</div>';
      }
    }
    h+='</div>';
  }
  c.innerHTML=h;
  restoreAnswered();
}

function startModuleTest(modId){
  const bank=BANKS[modId]||[];
  const questions=generateQuiz(bank,MODULE_TEST_SIZE);
  const attemptId='att_'+Date.now();
  state.activeQuizzes[modId]={attemptId, questions, finished:false, answers:{}};
  saveState(); navigate('mod_'+modId);
}

function renderActiveQuiz(quiz,quizKey){
  let h=`<div class="quiz-box"><div class="quiz-header"><h4>Attempt in progress</h4><span>${Object.keys(quiz.answers).length}/${quiz.questions.length} answered</span></div><div class="quiz-body">`;
  quiz.questions.forEach((q,qi)=>{h+=renderQuestion(q,qi,quizKey);});
  h+=`</div></div><div style="text-align:center;margin-top:16px"><button class="btn btn-primary btn-lg" onclick="finishQuiz('${quizKey}')">Finish Test</button></div><div id="result_${quizKey}"></div>`;
  return h;
}

function renderInlineQuiz(questions,quizKey){
  let h=`<div class="quiz-box" style="margin-top:16px"><div class="quiz-header"><h4>Check Your Understanding</h4><span>${questions.length} questions</span></div><div class="quiz-body">`;
  questions.forEach((q,qi)=>{h+=renderQuestion(q,qi,quizKey,true);});
  h+='</div></div>';
  return h;
}

function renderQuestion(q,qi,quizKey,isInline=false){
  const qid=`${quizKey}_${qi}`;
  const typeNames={single:'Single Choice',multiple:'Multiple Choice',truefalse:'True / False',fillin:'Fill In',matching:'Matching'};
  let h=`<div class="q-card" id="qc_${qid}"><div class="q-meta"><span class="q-num">#${qi+1}</span><span class="q-type">${typeNames[q.type]||q.type}</span></div>`;
  h+=`<div class="q-text">${q.question}</div>`;
  if(q.type==='single'||q.type==='truefalse'){
    h+='<div class="q-options">';
    q.options.forEach((o,oi)=>{h+=`<label class="q-opt" id="o_${qid}_${oi}" onclick="pickSingle('${qid}',${oi},${q.options.length})"><input type="radio" name="r_${qid}" value="${oi}"> ${o}</label>`;});
    h+='</div>';
  } else if(q.type==='multiple'){
    h+='<div class="q-options">';
    q.options.forEach((o,oi)=>{h+=`<label class="q-opt" id="o_${qid}_${oi}"><input type="checkbox" id="cb_${qid}_${oi}"> ${o}</label>`;});
    h+='</div>';
  } else if(q.type==='fillin'){
    h+=`<input class="q-fillin" id="fi_${qid}" placeholder="Type your answer...">`;
  } else if(q.type==='matching'){
    h+='<div class="match-grid">';
    q.pairs.forEach((p,pi)=>{
      h+=`<div class="match-left">${p.left}</div><select class="match-select" id="ms_${qid}_${pi}"><option value="">— select —</option>`;
      q.rightOptions.forEach((r,ri)=>{h+=`<option value="${ri}">${r}</option>`;});
      h+='</select>';
    });
    h+='</div>';
  }
  h+=`<div class="q-check"><button class="btn btn-primary" id="cb_${qid}" onclick="checkQ('${quizKey}',${qi},${isInline})">Check</button></div>`;
  h+=`<div class="q-expl" id="ex_${qid}"></div></div>`;
  return h;
}

function pickSingle(qid,sel,total){ for(let i=0;i<total;i++){const e=document.getElementById('o_'+qid+'_'+i);if(e)e.classList.toggle('selected',i===sel);} }

function getQuestionData(quizKey,qi){
  // Inline quiz
  for(const mod of MODULES){
    for(let si=0;si<(mod.sections?.length||0);si++){
      const key=`${mod.id}_s${si}`;
      if(key===quizKey) return mod.sections[si].checkQuestions?.[qi];
    }
  }
  // Active quiz (module test or final)
  const aq=state.activeQuizzes[quizKey==='final'?'final':quizKey];
  if(aq) return aq.questions[qi];
  return null;
}

function checkQ(quizKey,qi,isInline){
  const q=getQuestionData(quizKey,qi);
  if(!q) return;
  const qid=`${quizKey}_${qi}`;
  const card=document.getElementById('qc_'+qid);
  if(!card||card.classList.contains('correct')||card.classList.contains('wrong')) return;
  let ok=false, ans;

  if(q.type==='single'||q.type==='truefalse'){
    const rads=document.querySelectorAll(`input[name="r_${qid}"]`);
    let sel=-1; rads.forEach((r,i)=>{if(r.checked)sel=i;});
    if(sel===-1){alert('Select an answer');return;}
    ans=sel; ok=sel===q.correct;
    q.options.forEach((_,oi)=>{const e=document.getElementById('o_'+qid+'_'+oi);if(e){e.classList.add('locked');if(oi===q.correct)e.classList.add('correct-show');if(oi===sel&&!ok)e.classList.add('wrong-show');}});
  } else if(q.type==='multiple'){
    const checked=[];
    q.options.forEach((_,oi)=>{if(document.getElementById('cb_'+qid+'_'+oi)?.checked)checked.push(oi);});
    if(!checked.length){alert('Select at least one');return;}
    ans=checked; const cs=new Set(q.correct),us=new Set(checked);
    ok=cs.size===us.size&&[...cs].every(v=>us.has(v));
    q.options.forEach((_,oi)=>{const e=document.getElementById('o_'+qid+'_'+oi);if(e){e.classList.add('locked');if(cs.has(oi))e.classList.add('correct-show');if(us.has(oi)&&!cs.has(oi))e.classList.add('wrong-show');}});
  } else if(q.type==='fillin'){
    const inp=document.getElementById('fi_'+qid);if(!inp)return;
    const v=inp.value.trim().toLowerCase();if(!v){alert('Type an answer');return;}
    ans=v; const accepts=Array.isArray(q.correct)?q.correct:[q.correct];
    ok=accepts.some(a=>a.toLowerCase()===v);
    inp.disabled=true; inp.style.borderColor=ok?'var(--success)':'var(--danger)';
  } else if(q.type==='matching'){
    const answers=[]; let allDone=true;
    q.pairs.forEach((_,pi)=>{const s=document.getElementById('ms_'+qid+'_'+pi);if(!s||s.value==='')allDone=false;else answers.push(parseInt(s.value));});
    if(!allDone){alert('Fill all matches');return;}
    ans=answers; ok=q.correct.every((c,i)=>c===answers[i]);
    q.pairs.forEach((_,pi)=>{const s=document.getElementById('ms_'+qid+'_'+pi);if(s){s.disabled=true;s.style.borderColor=q.correct[pi]===answers[pi]?'var(--success)':'var(--danger)';}});
  }

  card.classList.add(ok?'correct':'wrong');
  const expl=document.getElementById('ex_'+qid);
  if(expl){expl.className='q-expl show '+(ok?'ok':'fail');expl.innerHTML=(ok?'<strong>Correct!</strong> ':'<strong>Incorrect.</strong> ')+(q.explanation||'');}
  const btn=document.getElementById('cb_'+qid);
  if(btn){btn.disabled=true;btn.textContent=ok?'Correct':'Wrong';}

  // Save to active quiz state
  if(!isInline){
    const aq=state.activeQuizzes[quizKey==='final'?'final':quizKey];
    if(aq){aq.answers[qi]={answer:ans,correct:ok}; saveState();}
  }
  // Save inline
  if(isInline){
    if(!state.quizAnswers[quizKey])state.quizAnswers[quizKey]={};
    state.quizAnswers[quizKey][qi]={answer:ans,correct:ok}; saveState();
  }
}

function finishQuiz(quizKey){
  const aq=state.activeQuizzes[quizKey==='final'?'final':quizKey];
  if(!aq)return;
  const total=aq.questions.length;
  let correct=0; for(let i=0;i<total;i++){if(aq.answers[i]?.correct)correct++;}
  const score=total>0?Math.round(correct/total*100):0;
  aq.finished=true;

  const attempt={id:aq.attemptId,date:new Date().toISOString(),score,correct,total,questionIds:aq.questions.map(q=>q.id)};

  if(quizKey==='final'){
    if(!state.attempts.final)state.attempts.final=[];
    state.attempts.final.push(attempt);
    state.finalTestResult=Math.max(state.finalTestResult||0,score);
  } else {
    if(!state.attempts[quizKey])state.attempts[quizKey]=[];
    state.attempts[quizKey].push(attempt);
  }
  saveState();

  const rd=document.getElementById('result_'+quizKey);
  if(rd){
    const pass=score>=80;
    rd.innerHTML=`<div class="result-card ${pass?'pass':'fail'}"><div class="result-score">${score}%</div><div class="result-sub">${correct} of ${total} correct</div><div style="margin-top:12px;font-size:16px">${pass?'Passed! Well done.':'Need 80% to pass. Review the material and try again.'}</div></div>`;
    rd.scrollIntoView({behavior:'smooth'});
  }
  renderSidebar();
}

function restoreAnswered(){
  // Restore inline quiz visual state
  Object.entries(state.quizAnswers).forEach(([qk,answers])=>{
    Object.entries(answers).forEach(([qi,data])=>{
      const qid=`${qk}_${qi}`;
      const card=document.getElementById('qc_'+qid);
      if(!card||card.classList.contains('correct')||card.classList.contains('wrong'))return;
      const q=getQuestionData(qk,parseInt(qi));
      if(!q)return;
      card.classList.add(data.correct?'correct':'wrong');
      const expl=document.getElementById('ex_'+qid);
      if(expl){expl.className='q-expl show '+(data.correct?'ok':'fail');expl.innerHTML=(data.correct?'<strong>Correct!</strong> ':'<strong>Incorrect.</strong> ')+(q.explanation||'');}
      const btn=document.getElementById('cb_'+qid);
      if(btn){btn.disabled=true;btn.textContent=data.correct?'Correct':'Wrong';}
    });
  });
}

// ========== FINAL TEST ==========
function renderFinal(c){
  let h='<div class="card"><h2>Final Assessment</h2>';
  h+=`<p><span class="tag tag-primary">${FINAL_BANK.length} questions in bank</span> <span class="tag tag-accent">${FINAL_TEST_SIZE} per attempt</span></p>`;
  h+='<div class="info-block">Comprehensive test covering all modules. Each attempt draws a random subset. Pass threshold: 80%.</div>';
  const active=state.activeQuizzes.final;
  if(active&&!active.finished){
    h+=renderActiveQuiz(active,'final');
  } else {
    h+=`<div class="test-start"><div class="icon">🎓</div><h3>Final Comprehensive Assessment</h3>
<p>${FINAL_TEST_SIZE} questions randomly selected from ${FINAL_BANK.length}.<br>Covers all 6 modules. Pass threshold: 80%.</p>
<button class="btn btn-primary btn-lg" onclick="startFinalTest()">Start Assessment</button></div>`;
    const atts=state.attempts.final||[];
    if(atts.length){
      h+='<div class="attempt-history"><h4>Previous Attempts</h4>';
      atts.forEach((a,i)=>{h+=`<div class="attempt-row"><span>Attempt ${i+1} — ${new Date(a.date).toLocaleString()}</span><span class="score" style="color:${a.score>=80?'var(--success)':'var(--danger)'};">${a.score}% (${a.correct}/${a.total})</span></div>`;});
      h+='</div>';
    }
  }
  h+='</div>';
  c.innerHTML=h;
}

function startFinalTest(){
  const questions=generateQuiz(FINAL_BANK,FINAL_TEST_SIZE);
  state.activeQuizzes.final={attemptId:'att_'+Date.now(),questions,finished:false,answers:{}};
  saveState(); navigate('final');
}

// ========== GLOSSARY ==========
function renderGlossary(c){
  let h='<div class="card"><h2>Glossary</h2>';
  h+='<input class="g-search" placeholder="Search terms..." oninput="filterG(this.value)">';
  h+='<table class="info-table" id="gtable"><thead><tr><th>Термин (RU)</th><th>Term (EN)</th><th>Definition</th></tr></thead><tbody>';
  GLOSSARY.forEach(g=>{h+=`<tr class="grow" data-s="${(g.ru+' '+g.en+' '+g.def).toLowerCase()}"><td><strong>${g.ru}</strong></td><td>${g.en}</td><td>${g.def}</td></tr>`;});
  h+='</tbody></table></div>';
  c.innerHTML=h;
}
function filterG(v){const s=v.toLowerCase();document.querySelectorAll('.grow').forEach(r=>{r.style.display=r.dataset.s.includes(s)?'':'none';});}

// ========== RESULTS ==========
function renderResults(c){
  let h='<div class="card"><h2>Results</h2>';
  if(state.userName)h+=`<p><strong>Learner:</strong> ${esc(state.userName)}</p>`;
  h+='<table class="info-table"><thead><tr><th>Module</th><th>Best Score</th><th>Attempts</th><th>Status</th></tr></thead><tbody>';
  MODULES.forEach(m=>{
    const atts=state.attempts[m.id]||[];
    const best=atts.length?Math.max(...atts.map(a=>a.score)):null;
    h+=`<tr><td>${m.title}</td><td>${best!==null?best+'%':'—'}</td><td>${atts.length}</td><td>${best!==null?(best>=80?'<span style="color:var(--success)">Passed</span>':'<span style="color:var(--danger)">Failed</span>'):'—'}</td></tr>`;
  });
  h+='</tbody></table>';
  const fatts=state.attempts.final||[];
  if(fatts.length){
    const best=Math.max(...fatts.map(a=>a.score));
    const pass=best>=80;
    h+=`<div class="result-card ${pass?'pass':'fail'}" style="margin-top:20px"><div class="result-score">${best}%</div><div class="result-sub">Final Assessment: ${pass?'PASSED':'FAILED'} (${fatts.length} attempt${fatts.length>1?'s':''})</div></div>`;
  }
  h+='<div style="margin-top:20px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">';
  h+='<button class="btn btn-primary" onclick="exportResults(\'json\')">Export JSON</button>';
  h+='<button class="btn btn-primary" onclick="exportResults(\'csv\')">Export CSV</button>';
  h+='<button class="btn" onclick="exportResults(\'md\')">Export MD</button>';
  h+='</div></div>';
  c.innerHTML=h;
}

// ========== EXPORT ==========
function exportResults(fmt){
  const modResults=MODULES.map(m=>{
    const atts=state.attempts[m.id]||[];
    const best=atts.length?Math.max(...atts.map(a=>a.score)):null;
    return {module:m.title,bestScore:best!==null?best+'%':'N/A',attempts:atts.length,status:best!==null?(best>=80?'Passed':'Failed'):'Pending',
      attemptDetails:atts.map(a=>({date:a.date,score:a.score+'%',correct:a.correct,total:a.total,attemptId:a.id}))};
  });
  const fatts=state.attempts.final||[];
  const fbest=fatts.length?Math.max(...fatts.map(a=>a.score)):null;
  const data={
    userName:state.userName||'Anonymous',exportDate:new Date().toISOString(),passThreshold:'80%',
    overallProgress:getOverallPct()+'%',
    modules:modResults,
    finalTest:{bestScore:fbest!==null?fbest+'%':'N/A',attempts:fatts.length,status:fbest!==null?(fbest>=80?'Passed':'Failed'):'Pending',
      attemptDetails:fatts.map(a=>({date:a.date,score:a.score+'%',correct:a.correct,total:a.total,attemptId:a.id}))
    }
  };
  let content,filename,mime;
  if(fmt==='json'){content=JSON.stringify(data,null,2);filename='dama_results.json';mime='application/json';}
  else if(fmt==='csv'){
    let csv='Module,Best Score,Attempts,Status\n';
    data.modules.forEach(m=>{csv+=`"${m.module}",${m.bestScore},${m.attempts},${m.status}\n`;});
    csv+=`"Final Test",${data.finalTest.bestScore},${data.finalTest.attempts},${data.finalTest.status}\n`;
    csv+=`\nLearner,${data.userName}\nDate,${data.exportDate}\nOverall,${data.overallProgress}\nThreshold,80%\n`;
    csv+='\nAttempt Details\nModule,Attempt,Date,Score\n';
    data.modules.forEach(m=>{m.attemptDetails.forEach((a,i)=>{csv+=`"${m.module}",${i+1},${a.date},${a.score}\n`;});});
    data.finalTest.attemptDetails.forEach((a,i)=>{csv+=`"Final Test",${i+1},${a.date},${a.score}\n`;});
    content=csv;filename='dama_results.csv';mime='text/csv';
  } else {
    let md=`# DAMA DMBOK Course Results\n\n**Learner:** ${data.userName}\n**Date:** ${data.exportDate}\n**Progress:** ${data.overallProgress}\n\n## Module Results\n\n| Module | Best | Attempts | Status |\n|--------|------|----------|--------|\n`;
    data.modules.forEach(m=>{md+=`| ${m.module} | ${m.bestScore} | ${m.attempts} | ${m.status} |\n`;});
    md+=`\n## Final Test\n\n- **Best:** ${data.finalTest.bestScore}\n- **Status:** ${data.finalTest.status}\n- **Attempts:** ${data.finalTest.attempts}\n\n## Attempt History\n\n`;
    data.modules.forEach(m=>{if(m.attemptDetails.length){md+=`### ${m.module}\n`;m.attemptDetails.forEach((a,i)=>{md+=`- Attempt ${i+1}: ${a.score} (${a.correct}/${a.total}) — ${a.date} [${a.attemptId}]\n`;});}});
    if(data.finalTest.attemptDetails.length){md+='### Final Test\n';data.finalTest.attemptDetails.forEach((a,i)=>{md+=`- Attempt ${i+1}: ${a.score} (${a.correct}/${a.total}) — ${a.date} [${a.attemptId}]\n`;});}
    content=md;filename='dama_results.md';mime='text/markdown';
  }
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}

function resetProgress(){
  if(!confirm('Reset all progress? This cannot be undone.'))return;
  localStorage.removeItem('dama2_state');
  state={userName:'',currentPage:'home',quizAnswers:{},attempts:{},activeQuizzes:{},finalTestResult:null};
  render();
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ========== INIT ==========
loadState(); render();
</script>

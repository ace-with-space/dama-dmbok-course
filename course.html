<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAMA DMBOK — Self-Study Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#f0f2f7;--card:#fff;--card-hover:#f8f9fc;
--sidebar:linear-gradient(180deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);
--primary:#4f46e5;--primary-light:#6366f1;--primary-bg:rgba(79,70,229,.08);
--accent:#06b6d4;--accent-bg:rgba(6,182,212,.08);
--success:#10b981;--success-bg:rgba(16,185,129,.08);
--danger:#ef4444;--danger-bg:rgba(239,68,68,.08);
--warning:#f59e0b;--warning-bg:rgba(245,158,11,.08);
--text:#1e293b;--text-secondary:#475569;--text-muted:#94a3b8;
--border:#e2e8f0;--border-light:#f1f5f9;
--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
--shadow-md:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.03);
--shadow-lg:0 10px 15px rgba(0,0,0,.06),0 4px 6px rgba(0,0,0,.03);
--radius:12px;--radius-sm:8px;--radius-xs:6px;
--sidebar-w:270px;
--font:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7;font-size:15px;-webkit-font-smoothing:antialiased}
/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--sidebar);color:#e2e8f0;overflow-y:auto;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sb-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{font-size:20px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary-light),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.sb-subtitle{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.nav-group{padding:16px 0}
.nav-group-label{padding:0 20px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.3);font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:all .2s;font-size:13px;border:none;background:none;color:rgba(255,255,255,.7);width:100%;text-align:left;font-family:var(--font);border-left:3px solid transparent;position:relative}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.05)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.1);border-left-color:var(--accent);font-weight:600}
.nav-badge{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.1)}
.nav-badge.done{background:var(--success);color:#fff}
.nav-badge.progress{background:rgba(99,102,241,.5);color:#fff}
/* MAIN */
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-title{font-weight:600;font-size:14px;color:var(--text-secondary);white-space:nowrap}
.progress-track{flex:1;max-width:360px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.topbar-actions{display:flex;gap:6px;margin-left:auto}
.btn{padding:7px 14px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-family:var(--font);color:var(--text-secondary)}
.btn:hover{border-color:var(--primary-light);color:var(--primary);box-shadow:var(--shadow)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-light);border-color:var(--primary-light);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-danger{color:var(--danger);border-color:transparent;background:transparent}
.btn-danger:hover{background:var(--danger-bg);border-color:var(--danger)}
.btn-lg{padding:12px 28px;font-size:15px;border-radius:var(--radius-sm);font-weight:600}
.content{max-width:860px;margin:0 auto;padding:28px 32px 60px;width:100%}
/* CARDS */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:28px 32px;margin-bottom:20px;box-shadow:var(--shadow);transition:box-shadow .2s}
.card h2{color:var(--primary);margin-bottom:14px;font-size:22px;font-weight:700;letter-spacing:-.3px}
.card h3{color:var(--text);margin:18px 0 10px;font-size:17px;font-weight:650}
.card h4{margin:14px 0 8px;font-size:15px;font-weight:650}
.card p{margin:6px 0}
.tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.3px}
.tag-primary{background:var(--primary-bg);color:var(--primary)}
.tag-accent{background:var(--accent-bg);color:#0891b2}
.tag-success{background:var(--success-bg);color:#059669}
/* TERM BLOCKS */
.term{background:var(--primary-bg);padding:1px 7px;border-radius:4px;font-weight:600;font-size:14px}
.term-en{color:var(--primary);font-style:italic}
.def-block{background:var(--warning-bg);border-left:3px solid var(--warning);padding:14px 18px;margin:12px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:14px}
.warn-block{background:var(--danger-bg);border-left:3px solid var(--danger);padding:14px 18px;margin:12px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:14px}
.info-block{background:var(--primary-bg);border-left:3px solid var(--primary);padding:14px 18px;margin:12px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:14px}
.example-block{background:var(--success-bg);border-left:3px solid var(--success);padding:14px 18px;margin:12px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:14px}
ul,ol{margin:6px 0 6px 22px}li{margin:3px 0;font-size:14px}
table.info-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.info-table th{background:var(--primary);color:#fff;padding:8px 14px;text-align:left;font-weight:600}
.info-table td{padding:8px 14px;border-bottom:1px solid var(--border)}
.info-table tr:hover td{background:var(--border-light)}
/* QUIZ */
.quiz-box{margin:20px 0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.quiz-header{background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.quiz-header h4{color:#fff;margin:0;font-size:15px}
.quiz-body{padding:16px 20px}
.q-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:12px;transition:all .3s}
.q-card.correct{border-color:var(--success);background:var(--success-bg)}
.q-card.wrong{border-color:var(--danger);background:var(--danger-bg)}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.q-num{font-size:11px;color:var(--text-muted);font-weight:600}
.q-type{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--primary-bg);color:var(--primary);font-weight:600}
.q-text{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.6}
.q-options{display:flex;flex-direction:column;gap:5px}
.q-opt{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-xs);cursor:pointer;transition:all .15s;background:#fff;font-size:13px}
.q-opt:hover:not(.locked){background:var(--primary-bg);border-color:var(--primary-light)}
.q-opt.selected{border-color:var(--primary);background:var(--primary-bg)}
.q-opt.correct-show{border-color:var(--success);background:var(--success-bg)}
.q-opt.wrong-show{border-color:var(--danger);background:var(--danger-bg)}
.q-opt.locked{cursor:default}
.q-opt input{margin-top:2px;accent-color:var(--primary)}
.q-fillin{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:14px;font-family:var(--font)}
.q-fillin:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.match-left{padding:9px 12px;background:var(--primary-bg);border-radius:var(--radius-xs);font-size:13px;display:flex;align-items:center}
.match-select{padding:8px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:13px;font-family:var(--font)}
.q-check{margin-top:8px}
.q-expl{margin-top:10px;padding:12px 16px;border-radius:var(--radius-xs);font-size:13px;line-height:1.6;display:none}
.q-expl.show{display:block}
.q-expl.ok{background:var(--success-bg);border:1px solid rgba(16,185,129,.2)}
.q-expl.fail{background:var(--danger-bg);border:1px solid rgba(239,68,68,.2)}
/* RESULT */
.result-card{text-align:center;padding:32px;border-radius:var(--radius);margin:20px 0;border:2px solid}
.result-card.pass{border-color:var(--success);background:var(--success-bg)}
.result-card.fail{border-color:var(--danger);background:var(--danger-bg)}
.result-score{font-size:56px;font-weight:800;letter-spacing:-2px}
.result-card.pass .result-score{color:var(--success)}
.result-card.fail .result-score{color:var(--danger)}
.result-sub{font-size:16px;margin-top:6px;color:var(--text-secondary)}
/* HOME */
.home-hero{background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#06b6d4 100%);border-radius:var(--radius);padding:36px 32px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden}
.home-hero::after{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(255,255,255,.1) 0%,transparent 70%);border-radius:50%}
.home-hero h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.home-hero p{opacity:.85;font-size:15px;max-width:500px}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin:20px 0}
.home-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.home-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--primary-light)}
.home-card h3{font-size:14px;font-weight:650;margin-bottom:6px;color:var(--text)}
.home-card p{font-size:12px;color:var(--text-muted)}
.home-card .mc-bar{margin-top:12px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.home-card .mc-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;transition:width .5s}
/* INPUT */
.input{padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);width:100%;max-width:320px;transition:border-color .15s}
.input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
/* GLOSSARY */
.g-search{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);margin-bottom:14px}
.g-search:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
/* TEST START */
.test-start{text-align:center;padding:40px 20px}
.test-start .icon{font-size:48px;margin-bottom:16px}
.test-start h3{font-size:20px;margin-bottom:8px}
.test-start p{color:var(--text-muted);margin-bottom:20px;font-size:14px}
.attempt-history{margin-top:20px}
.attempt-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius-xs);margin-bottom:6px;font-size:13px}
.attempt-row .score{font-weight:700}
/* MOBILE */
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--primary);color:#fff;border:none;padding:8px 12px;border-radius:var(--radius-xs);font-size:18px;cursor:pointer;box-shadow:var(--shadow-md)}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
.main{margin-left:0}.menu-toggle{display:block}.content{padding:16px}.card{padding:18px}
}
@media print{.sidebar,.topbar,.menu-toggle{display:none}.main{margin-left:0}}
</style>
</head>
<body>
<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776;</button>
<nav class="sidebar" id="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">DAMA DMBOK</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="topbar-actions">
      <button class="btn" onclick="exportResults('json')">Export JSON</button>
      <button class="btn" onclick="exportResults('csv')">Export CSV</button>
      <button class="btn btn-danger" onclick="resetProgress()">Reset</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
<script>
// ===================== MODULE CONTENT =====================
const MODULES=[
{id:'m1',title:'Data Management',chapter:'DAMA DMBOK Chapter 1',
objectives:['Understand data, information, knowledge, wisdom (DIKW)','Know the DAMA Wheel and 11 knowledge areas','Understand data as an enterprise asset','Know data lifecycle stages','Understand data management principles and roles'],
sections:[
{title:'Что такое данные и DIKW-пирамида',content:`
<p><span class="term">Данные / <span class="term-en">Data</span></span> — представление фактов в формализованном виде, пригодном для обработки. Сами по себе данные не несут смысла без контекста.</p>
<div class="def-block"><strong>DIKW-пирамида:</strong><br>
<strong>Data</strong> (данные) → <strong>Information</strong> (информация = данные + контекст) → <strong>Knowledge</strong> (знание = информация + опыт + анализ) → <strong>Wisdom</strong> (мудрость = применение знаний для решений)
</div>
<h4>Данные как актив / Data as an Asset</h4>
<p>DAMA DMBOK рассматривает данные как <span class="term">корпоративный актив / <span class="term-en">enterprise asset</span></span>. Уникальные свойства:</p>
<ul><li><strong>Неисчерпаемость</strong> — не расходуются при использовании</li>
<li><strong>Мультипликативность</strong> — копируются без потери оригинала</li>
<li><strong>Нематериальность / Intangible</strong> — не имеют физической формы</li>
<li><strong>Обесценивание</strong> — устаревшие данные теряют актуальность</li></ul>
<div class="warn-block"><strong>Типичная ошибка:</strong> Считать данные «заботой IT». Данные — бизнес-актив, IT обеспечивает инфраструктуру. Ответственность за качество и использование — на бизнесе.</div>`,
checkQuestions:[
{type:'single',question:'Какой правильный порядок уровней DIKW снизу вверх?',options:['Knowledge → Information → Data → Wisdom','Data → Information → Knowledge → Wisdom','Information → Data → Wisdom → Knowledge','Data → Knowledge → Information → Wisdom'],correct:1,explanation:'DIKW: Data → Information → Knowledge → Wisdom.'},
{type:'truefalse',question:'Данные расходуются при использовании, как физические активы.',options:['Верно','Неверно'],correct:1,explanation:'Неисчерпаемость — ключевое свойство данных. Они не расходуются при использовании.'}
]},
{title:'Определение Data Management и жизненный цикл данных',content:`
<div class="def-block"><strong>Управление данными / Data Management</strong> — разработка, выполнение и контроль планов, политик и процедур для управления данными на протяжении их жизненного цикла, обеспечивая защиту и повышая ценность данных.</div>
<h4>Жизненный цикл данных / Data Lifecycle</h4>
<ol><li><strong>Create</strong> — создание/получение данных</li>
<li><strong>Store</strong> — сохранение в системах</li>
<li><strong>Use</strong> — чтение, обработка, анализ</li>
<li><strong>Share</strong> — передача между системами/людьми</li>
<li><strong>Archive</strong> — перенос в долгосрочное хранилище</li>
<li><strong>Purge</strong> — удаление по истечении срока</li></ol>
<div class="info-block"><strong>Для бизнес-аналитика:</strong> При анализе требований спрашивайте: откуда берутся данные? кто использует? как долго хранить? когда можно удалить?</div>`,
checkQuestions:[
{type:'single',question:'Какая стадия жизненного цикла НЕ входит в DAMA DMBOK?',options:['Create','Validate','Archive','Purge'],correct:1,explanation:'Validate — не стадия lifecycle. Стадии: Create, Store, Use, Share, Archive, Purge.'},
{type:'fillin',question:'Как на английском называется стадия удаления данных по истечении срока?',correct:['purge','Purge','destroy','Destroy'],explanation:'Purge / Destroy — стадия удаления данных из жизненного цикла.'}
]},
{title:'Структура DAMA DMBOK и колесо DAMA',content:`
<p><span class="term">DAMA DMBOK</span> (<span class="term-en">Data Management Body of Knowledge</span>) — свод знаний по управлению данными от DAMA International. Это <strong>фреймворк</strong>, а не стандарт или методология.</p>
<h4>Колесо DAMA / DAMA Wheel</h4>
<p>В центре — <span class="term">Data Governance</span>. Вокруг — 10 областей знаний / <span class="term-en">knowledge areas</span>:</p>
<ul><li>Data Architecture</li><li>Data Modeling and Design</li><li>Data Storage and Operations</li><li>Data Security</li>
<li>Data Integration and Interoperability</li><li>Document and Content Management</li><li>Reference and Master Data</li>
<li>Data Warehousing and BI</li><li>Metadata</li><li>Data Quality</li></ul>
<p>Итого <strong>11 областей</strong> (включая Data Governance в центре).</p>
<p>Каждая область описана по единому шаблону: Definition, Goals, Activities, Inputs/Outputs, Roles, Practices, Tools, Metrics.</p>`,
checkQuestions:[
{type:'single',question:'Сколько областей знаний в DAMA DMBOK?',options:['8','10','11','13'],correct:2,explanation:'11 областей: Data Governance в центре + 10 вокруг.'},
{type:'single',question:'DAMA DMBOK — это:',options:['Стандарт ISO','Методология Agile','Фреймворк — свод знаний','Программное обеспечение'],correct:2,explanation:'DAMA DMBOK — фреймворк, а не стандарт или методология.'}
]},
{title:'Принципы и роли в управлении данными',content:`
<h4>Принципы</h4>
<ul><li><strong>Data is an asset</strong> — данные имеют ценность и требуют инвестиций</li>
<li><strong>Leadership commitment</strong> — без поддержки руководства инициативы обречены</li>
<li><strong>Cross-functional</strong> — требует сотрудничества бизнеса и IT</li>
<li><strong>Strategic approach</strong> — стратегия данных производна от бизнес-стратегии</li></ul>
<h4>Ключевые роли</h4>
<ul><li><span class="term">Data Owner</span> — бизнес-руководитель, ответственный за набор данных. Принимает стратегические решения.</li>
<li><span class="term">Data Steward</span> — операционная роль: ежедневное качество, соблюдение правил. Business Steward (правила) + Technical Steward (реализация).</li>
<li><span class="term">Data Custodian</span> — техническая роль: хранение, бэкапы, инфраструктура.</li>
<li><span class="term">CDO</span> (Chief Data Officer) — стратегическое руководство данными на уровне организации.</li></ul>
<div class="warn-block"><strong>Типичная ошибка:</strong> Путать Owner, Steward и Custodian. Owner = стратегические решения (бизнес). Steward = оперативное управление (бизнес). Custodian = техническое обеспечение (IT).</div>
<h4>Организационные модели</h4>
<ul><li><strong>Centralized</strong> — единая команда</li><li><strong>Decentralized</strong> — каждое подразделение самостоятельно</li>
<li><strong>Federated</strong> — единые стандарты + локальное исполнение (наиболее распространённая)</li></ul>`,
checkQuestions:[
{type:'matching',question:'Сопоставьте роли с описаниями:',pairs:[{left:'Data Owner'},{left:'Data Steward'},{left:'Data Custodian'}],rightOptions:['Бизнес-руководитель, стратегические решения','Оперативное управление и контроль качества','Техническое обеспечение хранения'],correct:[0,1,2],explanation:'Owner=стратегия, Steward=операции, Custodian=техника.'},
{type:'single',question:'Какая модель управления данными сочетает единые стандарты с локальным исполнением?',options:['Centralized','Decentralized','Federated','Hybrid'],correct:2,explanation:'Federated = единые стандарты + исполнение на уровне подразделений.'}
]}
]},
{id:'m2',title:'Data Governance',chapter:'DAMA DMBOK Chapter 3',
objectives:['Understand data governance definition and goals','Distinguish governance from management','Know governance organizational structures','Understand data policies and standards','Know maturity model levels'],
sections:[
{title:'Определение и цели Data Governance',content:`
<div class="def-block"><strong>Руководство данными / Data Governance</strong> — осуществление полномочий, контроля и совместного принятия решений в отношении управления данными как активом. Определяет: <strong>кто</strong> принимает решения, <strong>какие</strong> решения, <strong>как</strong> они контролируются.</div>
<p><strong>Data Governance vs Data Management:</strong> Management — вся совокупность практик (11 областей). Governance — одна из областей, координирующая все остальные. Аналогия: Management = все департаменты компании, Governance = совет директоров.</p>
<h4>Цели Governance</h4>
<ul><li>Определить <span class="term">accountability</span> (подотчётность) за данные</li>
<li>Установить правила и политики</li><li>Снизить риски</li>
<li>Обеспечить <span class="term">compliance</span> (соответствие требованиям)</li>
<li>Поддержать <span class="term">data-driven decision making</span></li></ul>
<div class="warn-block"><strong>Типичная ошибка:</strong> Governance = бюрократия. На самом деле хороший governance ускоряет работу: ясные правила, роли и определения снимают неопределённость.</div>`,
checkQuestions:[
{type:'truefalse',question:'Data Governance и Data Management — синонимы.',options:['Верно','Неверно'],correct:1,explanation:'Management = все практики. Governance = одна область, координирующая остальные.'},
{type:'single',question:'Data Governance определяет:',options:['Технические спецификации СУБД','Кто, какие и как принимает решения о данных','Языки программирования','Стоимость серверов'],correct:1,explanation:'Governance — о решениях: кто принимает, какие решения, как контролируются.'}
]},
{title:'Компоненты и организационная структура',content:`
<h4>Организационная структура</h4>
<ul><li><span class="term">Data Governance Council (DGC)</span> — высший орган: стратегия, приоритеты, политики. Включает бизнес-руководителей.</li>
<li><span class="term">Data Governance Committee</span> — рабочая группа, реализующая решения.</li>
<li><span class="term">Data Management Office (DMO)</span> / Data Governance Office — координирующее подразделение.</li>
<li><span class="term">Executive Sponsor</span> — топ-менеджер, обеспечивающий поддержку. Без спонсора программа не выживет.</li></ul>
<h4>Политики и стандарты</h4>
<ul><li><strong>Data Quality Policy</strong> — стандарты качества</li>
<li><strong>Data Security Policy</strong> — правила доступа и защиты</li>
<li><strong>Data Retention Policy</strong> — сроки хранения и удаления</li>
<li><strong>Data Usage Policy</strong> — допустимые способы использования</li></ul>
<div class="def-block"><strong>Data Standard</strong> — более детальный документ с конкретными правилами (формат даты, naming conventions). Policy — документ высокого уровня.</div>
<h4>Процессы</h4>
<ul><li><span class="term">Data Issue Management</span> — выявление и решение проблем</li>
<li><span class="term">Data Change Management</span> — контролируемые изменения</li>
<li><span class="term">Escalation</span> — передача нерешённых вопросов наверх</li></ul>`,
checkQuestions:[
{type:'single',question:'Без кого программа Data Governance не выживет?',options:['DBA','Executive Sponsor','Data Analyst','Внешний консультант'],correct:1,explanation:'Executive Sponsor — топ-менеджер, обеспечивающий поддержку и ресурсы.'},
{type:'truefalse',question:'Data Standard содержит более детальные правила, чем Data Policy.',options:['Верно','Неверно'],correct:0,explanation:'Standard = конкретные правила (формат даты). Policy = документ высокого уровня.'}
]},
{title:'Модель зрелости и подходы к внедрению',content:`
<h4>Data Management Maturity Model</h4>
<ol start="0"><li><strong>Level 0</strong> — нет управления, хаос</li>
<li><strong>Level 1 — Initial</strong> — отдельные инициативы, нет системности</li>
<li><strong>Level 2 — Repeatable</strong> — базовые процессы определены</li>
<li><strong>Level 3 — Defined</strong> — стандартизированные процессы</li>
<li><strong>Level 4 — Managed</strong> — процессы измеряются количественно</li>
<li><strong>Level 5 — Optimizing</strong> — постоянное совершенствование</li></ol>
<h4>Подходы к внедрению</h4>
<ul><li><strong>Top-down</strong> — от руководства. Плюс: авторитет. Риск: воспринимается как навязывание.</li>
<li><strong>Bottom-up</strong> — от команд. Плюс: практичность. Риск: недостаток полномочий.</li>
<li><strong>Combined</strong> — поддержка сверху + реализация снизу. Наиболее эффективный.</li></ul>
<div class="warn-block"><strong>Типичная ошибка:</strong> Перепрыгивать уровни зрелости. Каждый уровень строится на предыдущем.</div>`,
checkQuestions:[
{type:'single',question:'Какой уровень зрелости характеризуется стандартизированными процессами?',options:['Initial','Repeatable','Defined','Managed'],correct:2,explanation:'Defined (Level 3) = процессы стандартизированы и документированы.'},
{type:'single',question:'Какой подход к внедрению governance наиболее эффективен?',options:['Top-down','Bottom-up','Combined','Без формальной структуры'],correct:2,explanation:'Combined: поддержка руководства + практическая реализация командами.'}
]}
]},
{id:'m3',title:'Data Architecture',chapter:'DAMA DMBOK Chapter 4',
objectives:['Understand data architecture definition and goals','Know Enterprise Architecture domains','Know key architecture artifacts (DFD, CRUD, catalog)','Understand As-Is / To-Be and roadmaps','Know TOGAF and Zachman frameworks'],
sections:[
{title:'Определение и место в Enterprise Architecture',content:`
<div class="def-block"><strong>Архитектура данных / Data Architecture</strong> — совокупность спецификаций, описывающих структуру данных организации, их связь с процессами и приложениями, а также планы по управлению данными.</div>
<p>Data Architecture входит в <span class="term">Enterprise Architecture (EA)</span>, которая включает 4 домена:</p>
<ul><li><strong>Business Architecture</strong> — процессы, стратегия</li>
<li><strong>Data Architecture</strong> — структура и потоки данных</li>
<li><strong>Application Architecture</strong> — информационные системы</li>
<li><strong>Technology Architecture</strong> — инфраструктура</li></ul>
<h4>Цели</h4>
<ul><li>Определить потребности в данных</li><li>Согласовать структуру данных с бизнес-стратегией</li>
<li>Поддержать <span class="term">data reuse</span> (повторное использование)</li>
<li>Уменьшить <span class="term">data redundancy</span> (избыточность)</li>
<li>Устранить <span class="term">data silos</span> (изолированные островки данных)</li></ul>
<div class="warn-block"><strong>Типичная ошибка:</strong> Путать архитектуру данных с моделированием. Архитектура = стратегический уровень (план города). Моделирование = детальное проектирование (чертёж здания).</div>`,
checkQuestions:[
{type:'matching',question:'Сопоставьте домены EA:',pairs:[{left:'Business Architecture'},{left:'Data Architecture'},{left:'Application Architecture'},{left:'Technology Architecture'}],rightOptions:['Процессы и стратегия','Структура и потоки данных','Информационные системы','Инфраструктура'],correct:[0,1,2,3],explanation:'Каждый домен EA охватывает свой аспект организации.'},
{type:'truefalse',question:'Data Architecture и Data Modeling — одно и то же.',options:['Верно','Неверно'],correct:1,explanation:'Architecture = стратегический уровень. Modeling = детальное проектирование.'}
]},
{title:'Артефакты архитектуры данных',content:`
<ul><li><span class="term">Data Catalog</span> — инвентаризация всех наборов данных с описанием назначения, владельцев, расположения.</li>
<li><span class="term">Data Flow Diagram (DFD)</span> — визуализация движения данных: источники, потребители, преобразования, хранилища.</li>
<li><span class="term">CRUD Matrix</span> — таблица «процессы × данные», показывающая Create/Read/Update/Delete.</li>
<li><span class="term">Subject Area Model</span> — высокоуровневая модель предметных областей (клиенты, продукты, заказы).</li></ul>
<div class="def-block"><strong>Single Source of Truth (SSOT)</strong> — принцип: каждый элемент данных имеет один авторитетный источник.</div>`,
checkQuestions:[
{type:'single',question:'Что показывает CRUD Matrix?',options:['Скорость запросов','Какие процессы какие операции выполняют над данными','Стоимость хранения','Уровень безопасности'],correct:1,explanation:'CRUD Matrix сопоставляет процессы с операциями Create/Read/Update/Delete.'},
{type:'fillin',question:'Как расшифровывается SSOT?',correct:['single source of truth','Single Source of Truth'],explanation:'SSOT = Single Source of Truth — единый источник правды.'}
]},
{title:'As-Is, To-Be и фреймворки',content:`
<div class="def-block"><strong>As-Is</strong> — текущее состояние архитектуры. <strong>To-Be</strong> — целевое состояние. <strong>Roadmap</strong> — план перехода от As-Is к To-Be.</div>
<h4>Фреймворки</h4>
<ul><li><span class="term">TOGAF</span> (The Open Group Architecture Framework) — наиболее распространённый фреймворк EA.</li>
<li><span class="term">Zachman Framework</span> — матричный подход: вопросы (что, как, где, кто, когда, зачем) × уровни абстракции.</li></ul>
<h4>Типичные вызовы</h4>
<ul><li><strong>Data Silos</strong> — разрозненные данные</li>
<li><strong>Technical Debt</strong> — накопленные архитектурные компромиссы</li>
<li><strong>Shadow IT</strong> — системы, созданные без координации с IT</li></ul>`,
checkQuestions:[
{type:'single',question:'Roadmap архитектуры данных — это:',options:['Список серверов','План перехода от As-Is к To-Be','Каталог СУБД','Бюджет IT'],correct:1,explanation:'Roadmap = план перехода от текущего к целевому состоянию.'},
{type:'single',question:'Shadow IT — это:',options:['Теневые серверы','Системы, созданные подразделениями без координации с IT','Шифрование данных','Резервные копии'],correct:1,explanation:'Shadow IT = неконтролируемые системы, созданные бизнесом самостоятельно.'}
]}
]},
{id:'m4',title:'Data Modeling & Design',chapter:'DAMA DMBOK Chapter 5',
objectives:['Know entities, attributes, relationships, constraints','Distinguish CDM, LDM, PDM','Understand cardinality and keys','Know normalization (1NF, 2NF, 3NF)','Understand Star and Snowflake schemas'],
sections:[
{title:'Основы моделирования данных',content:`
<div class="def-block"><strong>Моделирование данных / Data Modeling</strong> — процесс создания визуального представления структуры данных, включающего сущности, атрибуты, связи и ограничения.</div>
<ul><li><span class="term">Entity</span> (сущность) — объект реального мира: клиент, заказ, продукт</li>
<li><span class="term">Attribute</span> (атрибут) — характеристика: имя, дата, цена</li>
<li><span class="term">Relationship</span> (связь) — отношение: «клиент размещает заказ»</li>
<li><span class="term">Constraint</span> (ограничение) — правило целостности: email уникален</li></ul>
<h4>Три уровня моделей</h4>
<table class="info-table"><tr><th></th><th>CDM</th><th>LDM</th><th>PDM</th></tr>
<tr><td>Аудитория</td><td>Бизнес</td><td>Бизнес + IT</td><td>IT / DBA</td></tr>
<tr><td>Детализация</td><td>Низкая</td><td>Высокая</td><td>Максимальная</td></tr>
<tr><td>Привязка к СУБД</td><td>Нет</td><td>Нет</td><td>Да</td></tr>
<tr><td>Нормализация</td><td>Нет</td><td>Обычно да</td><td>Может денорм.</td></tr></table>
<div class="warn-block"><strong>Типичная ошибка:</strong> Пропускать CDM. Без согласования с бизнесом есть риск хранить «не те» данные.</div>`,
checkQuestions:[
{type:'single',question:'Какая модель создаётся для бизнес-аудитории без технических деталей?',options:['PDM','LDM','CDM','ERD'],correct:2,explanation:'CDM = Conceptual Data Model — для бизнеса, без технических деталей.'},
{type:'single',question:'Какая модель привязана к конкретной СУБД?',options:['CDM','LDM','PDM','Все три'],correct:2,explanation:'PDM (Physical Data Model) оптимизирована для конкретной СУБД.'}
]},
{title:'Связи, ключи, нормализация и схемы',content:`
<h4>Кардинальность</h4>
<ul><li><strong>1:1</strong> (One-to-One) — сотрудник ↔ рабочее место</li>
<li><strong>1:M</strong> (One-to-Many) — клиент → заказы. Самый распространённый тип.</li>
<li><strong>M:M</strong> (Many-to-Many) — студент ↔ курс. Реализуется через промежуточную таблицу.</li></ul>
<h4>Ключи</h4>
<ul><li><span class="term">Primary Key (PK)</span> — уникальный идентификатор записи</li>
<li><span class="term">Foreign Key (FK)</span> — ссылка на PK другой сущности</li>
<li><span class="term">Natural Key</span> — на основе реальных данных (ИНН, email)</li>
<li><span class="term">Surrogate Key</span> — искусственный (автоинкрементный ID)</li></ul>
<h4>Нормализация / Normalization</h4>
<ul><li><strong>1NF</strong> — атомарность: каждое поле содержит одно неделимое значение</li>
<li><strong>2NF</strong> = 1NF + полная зависимость от всего PK</li>
<li><strong>3NF</strong> = 2NF + нет транзитивных зависимостей</li></ul>
<p><span class="term">Денормализация / Denormalization</span> — сознательное нарушение NF для ускорения чтения. OLTP обычно нормализован (3NF). OLAP часто денормализован.</p>
<h4>Схемы DWH</h4>
<ul><li><span class="term">Star Schema</span> — fact table в центре + денормализованные dimension tables вокруг</li>
<li><span class="term">Snowflake Schema</span> — то же, но dimension tables нормализованы</li></ul>
<p><span class="term">Fact Table</span> = числовые метрики. <span class="term">Dimension Table</span> = описательные атрибуты (кто, что, когда).</p>
<h4>Нотации</h4>
<ul><li><span class="term">IE (Information Engineering)</span> — crow's foot (воронья лапка). Наиболее распространена.</li>
<li><span class="term">UML</span> — универсальный язык моделирования</li>
<li><span class="term">IDEF1X</span> — стандарт NIST</li></ul>`,
checkQuestions:[
{type:'single',question:'Самый распространённый тип связи:',options:['One-to-One','One-to-Many','Many-to-Many','Zero-to-One'],correct:1,explanation:'1:M (One-to-Many) — самый частый тип связи.'},
{type:'single',question:'Star Schema содержит в центре:',options:['Dimension Table','Fact Table','Lookup Table','Bridge Table'],correct:1,explanation:'В Star Schema центральная таблица — Fact Table с метриками.'},
{type:'truefalse',question:'3NF устраняет транзитивные зависимости.',options:['Верно','Неверно'],correct:0,explanation:'3NF = 2NF + нет транзитивных зависимостей между неключевыми атрибутами.'}
]}
]},
{id:'m5',title:'Data Storage & Operations',chapter:'DAMA DMBOK Chapter 6',
objectives:['Know RDBMS vs NoSQL types','Understand ACID properties','Distinguish OLTP and OLAP','Know backup types and RPO/RTO','Understand cloud models and data virtualization'],
sections:[
{title:'Типы СУБД и ACID',content:`
<h4>RDBMS (Relational DBMS)</h4>
<p>Таблицы, SQL, <span class="term">ACID</span>-свойства:</p>
<ul><li><strong>Atomicity</strong> — транзакция: всё или ничего</li>
<li><strong>Consistency</strong> — БД переходит из одного согласованного состояния в другое</li>
<li><strong>Isolation</strong> — параллельные транзакции не влияют друг на друга</li>
<li><strong>Durability</strong> — после commit данные сохраняются даже при сбое</li></ul>
<p>Примеры: Oracle, PostgreSQL, MySQL, SQL Server.</p>
<h4>NoSQL</h4>
<ul><li><strong>Document stores</strong> — JSON-документы (MongoDB)</li>
<li><strong>Key-Value</strong> — простейшая модель (Redis)</li>
<li><strong>Column-family</strong> — данные по столбцам (Cassandra, HBase)</li>
<li><strong>Graph databases</strong> — узлы и связи (Neo4j)</li></ul>
<h4>OLTP vs OLAP</h4>
<table class="info-table"><tr><th></th><th>OLTP</th><th>OLAP</th></tr>
<tr><td>Назначение</td><td>Транзакции</td><td>Аналитика</td></tr>
<tr><td>Операции</td><td>Много INSERT/UPDATE</td><td>Сложные SELECT</td></tr>
<tr><td>Нормализация</td><td>Высокая (3NF)</td><td>Низкая (Star)</td></tr>
<tr><td>Данные</td><td>Текущие</td><td>Исторические</td></tr>
<tr><td>Пример</td><td>CRM, ERP</td><td>DWH, BI</td></tr></table>`,
checkQuestions:[
{type:'single',question:'Atomicity в ACID означает:',options:['Данные хранятся вечно','Транзакция: всё или ничего','Данные атомарны','Данные изолированы'],correct:1,explanation:'Atomicity = атомарность: транзакция полностью выполняется или откатывается.'},
{type:'matching',question:'Сопоставьте NoSQL типы с примерами:',pairs:[{left:'Document store'},{left:'Key-Value'},{left:'Graph'},{left:'Column-family'}],rightOptions:['MongoDB','Redis','Neo4j','Cassandra'],correct:[0,1,2,3],explanation:'MongoDB=документы, Redis=ключ-значение, Neo4j=граф, Cassandra=колонки.'}
]},
{title:'Backup, RPO/RTO и облачные модели',content:`
<h4>Типы бэкапов</h4>
<ul><li><strong>Full</strong> — полная копия</li>
<li><strong>Incremental</strong> — изменения с последнего бэкапа (любого)</li>
<li><strong>Differential</strong> — изменения с последнего полного бэкапа</li></ul>
<h4>Метрики доступности</h4>
<ul><li><span class="term">RPO (Recovery Point Objective)</span> — максимально допустимая потеря данных (в единицах времени)</li>
<li><span class="term">RTO (Recovery Time Objective)</span> — максимально допустимое время восстановления</li>
<li><span class="term">SLA (Service Level Agreement)</span> — соглашение об уровне обслуживания</li></ul>
<h4>Облачные модели</h4>
<ul><li><strong>IaaS</strong> — инфраструктура</li><li><strong>PaaS</strong> — платформа</li>
<li><strong>SaaS</strong> — готовое ПО</li><li><strong>DBaaS</strong> — СУБД как услуга</li></ul>
<div class="def-block"><strong>Data Virtualization</strong> — виртуальный слой доступа к данным из разных источников без физического перемещения.</div>
<div class="info-block"><strong>Для BA:</strong> RPO и RTO — ключевые нефункциональные требования. «Сколько данных допустимо потерять?» и «Как быстро восстановиться?»</div>`,
checkQuestions:[
{type:'single',question:'RPO определяет:',options:['Скорость запросов','Максимально допустимую потерю данных','Размер БД','Количество серверов'],correct:1,explanation:'RPO = Recovery Point Objective = допустимая потеря данных.'},
{type:'truefalse',question:'Data Virtualization перемещает данные физически.',options:['Верно','Неверно'],correct:1,explanation:'Виртуализация создаёт виртуальный слой БЕЗ перемещения данных.'}
]}
]},
{id:'m6',title:'Data Integration & Interoperability',chapter:'DAMA DMBOK Chapter 8',
objectives:['Understand data integration and interoperability','Know ETL vs ELT approaches','Understand integration patterns (point-to-point, hub-spoke, ESB)','Know canonical data model and MDM','Distinguish batch, real-time, and stream processing'],
sections:[
{title:'ETL, ELT и виртуализация',content:`
<div class="def-block"><strong>Data Integration</strong> — объединение данных из разных источников для предоставления согласованного набора.<br>
<strong>Data Interoperability</strong> — способность систем обмениваться данными и использовать их.</div>
<h4>ETL vs ELT</h4>
<table class="info-table"><tr><th></th><th>ETL</th><th>ELT</th></tr>
<tr><td>Порядок</td><td>Extract → Transform → Load</td><td>Extract → Load → Transform</td></tr>
<tr><td>Где преобразование</td><td>На промежуточном сервере</td><td>Внутри целевого хранилища</td></tr>
<tr><td>Когда использовать</td><td>Классические DWH</td><td>Облачные хранилища</td></tr></table>
<p><strong>Data Virtualization</strong> — без физического перемещения, через виртуальный слой.</p>
<p><strong>API Integration:</strong> REST API (наиболее распространённый), SOAP (строже, XML), GraphQL (гибкий).</p>`,
checkQuestions:[
{type:'single',question:'В ETL преобразование происходит:',options:['После загрузки','До загрузки','В источнике','Не происходит'],correct:1,explanation:'ETL: Extract → Transform → Load. Преобразование ДО загрузки.'},
{type:'single',question:'ELT популярен благодаря:',options:['Мощным облачным хранилищам','Уменьшению данных','Отказу от SQL','Сокращению бюджетов'],correct:0,explanation:'ELT стал популярен с облачными хранилищами (Snowflake, BigQuery).'}
]},
{title:'Паттерны интеграции и MDM',content:`
<h4>Паттерны</h4>
<ul><li><strong>Point-to-Point</strong> — прямые связи. Создаёт «спагетти» при масштабировании (n×(n-1)/2 связей).</li>
<li><strong>Hub-and-Spoke</strong> — центральный узел (хаб). Упрощает управление.</li>
<li><strong>ESB (Enterprise Service Bus)</strong> — промежуточный слой: маршрутизация, преобразование, мониторинг.</li>
<li><strong>Pub-Sub (Publish-Subscribe)</strong> — публикация + подписка. Обеспечивает <span class="term">loose coupling</span> (слабую связанность).</li></ul>
<div class="def-block"><strong>Canonical Data Model</strong> — единый промежуточный формат обмена. Каждая система маппится только в/из канонического формата, уменьшая количество маппингов.</div>
<h4>MDM (Master Data Management)</h4>
<p>Единое согласованное представление ключевых сущностей (клиенты, продукты). Определяет <span class="term">golden record</span> — авторитетную версию.</p>
<h4>Типы обмена</h4>
<ul><li><strong>Batch Processing</strong> — порциями по расписанию (аналитика)</li>
<li><strong>Real-Time</strong> — мгновенно (операционные процессы)</li>
<li><strong>Stream Processing</strong> — непрерывный поток (Kafka, Flink)</li></ul>
<div class="warn-block"><strong>Типичная ошибка:</strong> Point-to-Point для большого числа систем. Используйте Hub-and-Spoke или ESB.</div>`,
checkQuestions:[
{type:'single',question:'Point-to-Point создаёт проблемы при:',options:['2 системах','Большом числе систем','Облачном хранении','Использовании API'],correct:1,explanation:'Количество связей растёт как n×(n-1)/2 — неуправляемо.'},
{type:'fillin',question:'Как называется авторитетная версия мастер-данных в MDM?',correct:['golden record','Golden Record'],explanation:'Golden Record = «золотая запись», единая авторитетная версия.'},
{type:'single',question:'Pub-Sub обеспечивает:',options:['Жёсткую связанность','Loose coupling','Отсутствие обмена','Синхронный вызов'],correct:1,explanation:'Publish-Subscribe = слабая связанность: источник не зависит от получателей.'}
]}
]}

{id:'m2_13',topic:'gov_components',type:'single',question:'Data Issue Management is:',options:['Server monitoring','Process for identifying and resolving data problems','Database backup','Network configuration'],correct:1,explanation:'Data Issue Management = systematic identification and resolution of data problems.'},
{id:'m2_14',topic:'gov_components',type:'truefalse',question:'Escalation is a governance process for unresolved issues.',options:['True','False'],correct:0,explanation:'True. Escalation = elevating unresolved issues to higher authority levels.'},
{id:'m2_15',topic:'gov_roles',type:'single',question:'Without an Executive Sponsor, a governance program is likely to:',options:['Succeed faster','Fail due to lack of authority and resources','Become more agile','Cost less'],correct:1,explanation:'Executive Sponsor provides authority and resources — essential for survival.'},
{id:'m2_16',topic:'gov_roles',type:'single',question:'Business Data Steward focuses on:',options:['Server configuration','Business rules and data quality from a business perspective','Network security','Database tuning'],correct:1,explanation:'Business Steward = business rules, definitions, quality from business perspective.'},
{id:'m2_17',topic:'gov_roles',type:'single',question:'Technical Data Steward focuses on:',options:['Business definitions','Profiling, monitoring, and technical rule implementation','Executive presentations','Market analysis'],correct:1,explanation:'Technical Steward = profiling, monitoring, technical implementation of rules.'},
{id:'m2_18',topic:'gov_roles',type:'single',question:'Data Governance Council typically includes:',options:['Only IT staff','Business leaders and executives','Only external consultants','Junior analysts'],correct:1,explanation:'DGC includes business leaders — governance is a business function.'},
{id:'m2_19',topic:'gov_roles',type:'fillin',question:'What is the abbreviation for Data Governance Council?',correct:['DGC','dgc'],explanation:'DGC = Data Governance Council.'},
{id:'m2_20',topic:'maturity',type:'single',question:'At Maturity Level 3 (Defined), an organization has:',options:['No formal processes','Ad hoc processes','Standardized and documented processes','Quantitatively measured processes'],correct:2,explanation:'Defined = processes are standardized and documented.'},
{id:'m2_21',topic:'maturity',type:'single',question:'What distinguishes Level 4 (Managed) from Level 3 (Defined)?',options:['Having documentation','Quantitative measurement of processes','Having fewer roles','Using cloud technology'],correct:1,explanation:'Managed = Defined + processes are quantitatively measured and controlled.'},
{id:'m2_22',topic:'maturity',type:'single',question:'Level 5 (Optimizing) is characterized by:',options:['Initial awareness','Basic processes','Continuous improvement based on metrics','No formal governance'],correct:2,explanation:'Optimizing = continuous improvement driven by measurement.'},
{id:'m2_23',topic:'maturity',type:'truefalse',question:'An organization can skip from Level 1 directly to Level 5.',options:['True','False'],correct:1,explanation:'False. Each level builds on the previous — maturity is gradual.'},
{id:'m2_24',topic:'maturity',type:'single',question:'Level 0 in the maturity model means:',options:['Optimized processes','Chaotic, no formal data management','Standardized processes','Measured processes'],correct:1,explanation:'Level 0 = no formal data management, chaos.'},
{id:'m2_25',topic:'compliance',type:'single',question:'Governance supports compliance with:',options:['HTTP protocol','GDPR, HIPAA, and industry regulations','CSS standards','JSON schema'],correct:1,explanation:'Governance ensures data practices comply with regulations like GDPR, HIPAA.'},
{id:'m2_26',topic:'compliance',type:'single',question:'Metadata is essential for governance because:',options:['It makes data look pretty','You cannot manage what is not described','It replaces data quality','It eliminates data silos'],correct:1,explanation:'Without metadata, governance cannot know what data exists, who owns it, or what rules apply.'},
{id:'m2_27',topic:'compliance',type:'truefalse',question:'Data-driven decision making is possible without Data Governance.',options:['True','False'],correct:1,explanation:'Without governance, data quality is uncertain — decisions based on unreliable data are risky.'},
{id:'m2_28',topic:'gov_def',type:'single',question:'If Data Management is "all departments of a company," Data Governance is:',options:['The IT department','The board of directors','The cafeteria','The parking lot'],correct:1,explanation:'Governance = the board (setting strategy and rules). Management = all departments.'},
{id:'m2_29',topic:'gov_components',type:'single',question:'Policy compliance rate measures:',options:['Server uptime','How well the organization follows its data policies','Database query speed','Employee satisfaction'],correct:1,explanation:'Policy compliance rate = degree of adherence to established data policies.'},
{id:'m2_30',topic:'gov_roles',type:'single',question:'Data Trustee is an alternative name for:',options:['Data Steward','Data Owner','Data Custodian','Data Analyst'],correct:1,explanation:'Data Trustee = alternative name for Data Owner in some organizations.'},
{id:'m2_31',topic:'maturity',type:'single',question:'An organization with ad hoc, inconsistent data processes is at level:',options:['0','1','2','3'],correct:1,explanation:'Level 1 (Initial) = ad hoc, individual initiatives, no consistency.'},
{id:'m2_32',topic:'compliance',type:'single',question:'Governance coordinates Data Quality by:',options:['Automatically fixing errors','Defining standards, metrics, and accountability for quality','Replacing quality checks','Ignoring quality'],correct:1,explanation:'Governance defines quality standards, metrics, and who is responsible.'},
{id:'m2_33',topic:'gov_components',type:'single',question:'Data Change Management in governance controls:',options:['Employee promotions','Modifications to data and metadata','Office furniture changes','Marketing campaigns'],correct:1,explanation:'Data Change Management = controlled modifications to data and metadata.'},
{id:'m2_34',topic:'gov_roles',type:'single',question:'The Combined approach to governance implementation means:',options:['Only top-down','Only bottom-up','Executive support + practical implementation from teams','No formal approach'],correct:2,explanation:'Combined = top-down authority + bottom-up practical execution.'},
{id:'m2_35',topic:'maturity',type:'single',question:'At which level are processes repeatable but not yet standardized?',options:['Level 1','Level 2','Level 3','Level 4'],correct:1,explanation:'Level 2 (Repeatable) = basic processes exist but not fully standardized.'},
{id:'m2_36',topic:'gov_def',type:'single',question:'Governance ensures that data decisions are made through:',options:['Individual intuition','Formal processes and policies','Random selection','Technical defaults'],correct:1,explanation:'Governance = formal, transparent processes for data decisions.'},
{id:'m2_37',topic:'gov_components',type:'single',question:'Stewardship coverage measures:',options:['Server disk space','What percentage of data is managed by stewards','Network bandwidth','Employee count'],correct:1,explanation:'Stewardship coverage = extent of data assets under steward management.'},
{id:'m2_38',topic:'compliance',type:'single',question:'GDPR primarily concerns:',options:['Database performance','Protection of personal data in the EU','Network protocols','Software licensing'],correct:1,explanation:'GDPR = EU regulation for protection of personal data.'},
{id:'m2_39',topic:'gov_roles',type:'truefalse',question:'A Data Steward must always be an IT employee.',options:['True','False'],correct:1,explanation:'False. Stewards should understand business context. Ideally: Business + Technical Stewards.'},
{id:'m2_40',topic:'maturity',type:'fillin',question:'What is the highest level in the Data Management Maturity Model called?',correct:['optimizing','Optimizing'],explanation:'Level 5 = Optimizing = continuous improvement.'},
{id:'m2_41',topic:'gov_def',type:'single',question:'Data Governance is needed PRIMARILY because:',options:['Data is not important','Without it, accountability and rules are unclear','IT cannot work without it','Regulators demand it'],correct:1,explanation:'Governance solves the problem of unclear accountability and inconsistent rules.'},
{id:'m2_42',topic:'gov_components',type:'single',question:'Which is NOT a governance metric?',options:['Policy compliance rate','Issues resolved','Internet connection speed','Stewardship coverage'],correct:2,explanation:'Internet speed is an IT infrastructure metric, not governance.'},
{id:'m2_43',topic:'gov_roles',type:'single',question:'Data Governance Manager is responsible for:',options:['Writing code','Coordinating daily governance operations','Designing databases','Managing servers'],correct:1,explanation:'Governance Manager = day-to-day coordination of the governance program.'},
{id:'m2_44',topic:'compliance',type:'single',question:'Without metadata, governance fails because:',options:['Reports look bad','You cannot govern what you have not described','Data becomes encrypted','Storage runs out'],correct:1,explanation:'Metadata describes what data exists, who owns it — essential for governance.'},
{id:'m2_45',topic:'gov_def',type:'single',question:'Data Governance is most analogous to:',options:['A car engine','Corporate governance / board of directors','A database table','A programming language'],correct:1,explanation:'Just as corporate governance sets rules for a company, data governance sets rules for data.'},
{id:'m2_46',topic:'gov_components',type:'truefalse',question:'Data Governance only applies to large organizations.',options:['True','False'],correct:1,explanation:'Governance principles apply to any organization — scale of implementation varies.'},
{id:'m2_47',topic:'maturity',type:'single',question:'Repeatable (Level 2) means:',options:['No processes','Basic processes that can be repeated','Fully optimized','No documentation'],correct:1,explanation:'Repeatable = basic processes are defined and can be repeated consistently.'},
{id:'m2_48',topic:'gov_roles',type:'single',question:'Top-down governance approach risks:',options:['Lack of resources','Being perceived as imposed bureaucracy','Too much innovation','Insufficient authority'],correct:1,explanation:'Top-down risk = may be perceived as bureaucracy imposed from above.'},
{id:'m2_49',topic:'gov_roles',type:'single',question:'Bottom-up governance approach risks:',options:['Too much authority','Insufficient authority and resources','Over-regulation','Executive interference'],correct:1,explanation:'Bottom-up risk = initiatives from below may lack authority to enforce changes.'},
{id:'m2_50',topic:'compliance',type:'single',question:'Data Governance supports data-driven decisions by:',options:['Replacing human judgment','Ensuring data quality and trustworthiness','Making all decisions automatically','Eliminating data'],correct:1,explanation:'Governance ensures data is reliable — foundation for trustworthy decisions.'},
{id:'m2_51',topic:'gov_def',type:'fillin',question:'What type of decision making does governance support? (English, X-driven)',correct:['data-driven','Data-driven','data driven'],explanation:'Data-driven decision making = decisions based on data analysis.'},
{id:'m2_52',topic:'gov_components',type:'single',question:'DGC stands for:',options:['Data Generation Center','Data Governance Council','Database Global Configuration','Digital Governance Committee'],correct:1,explanation:'DGC = Data Governance Council — the top governance body.'},
{id:'m2_53',topic:'maturity',type:'single',question:'An organization at Level 4 (Managed) differs from Level 3 by:',options:['Having any processes','Measuring processes quantitatively','Having documentation','Using computers'],correct:1,explanation:'Managed = Defined + quantitative measurement and control.'},
{id:'m2_54',topic:'gov_roles',type:'single',question:'Who typically chairs the Data Governance Council?',options:['Junior analyst','CDO or senior executive','External consultant','DBA'],correct:1,explanation:'CDO or senior executive typically chairs the DGC.'},
{id:'m2_55',topic:'compliance',type:'single',question:'HIPAA is a regulation concerning:',options:['Financial data','Medical/health data in the US','Network protocols','Software patents'],correct:1,explanation:'HIPAA = US regulation for protection of medical/health data.'},
{id:'m2_56',topic:'gov_def',type:'truefalse',question:'Good Data Governance increases organizational agility.',options:['True','False'],correct:0,explanation:'True. Clear rules and accountability reduce friction and speed up decisions.'},
{id:'m2_57',topic:'gov_components',type:'single',question:'Data Standard vs Data Policy: a naming convention document is a:',options:['Policy','Standard','Neither','Both'],correct:1,explanation:'Naming conventions = detailed rules = Data Standard (more specific than Policy).'},
{id:'m2_58',topic:'maturity',type:'single',question:'To assess where an organization stands in data management, use:',options:['DIKW pyramid','Maturity Model','Star Schema','ETL process'],correct:1,explanation:'Data Management Maturity Model = tool for assessing current level of practice.'},
{id:'m2_59',topic:'gov_roles',type:'single',question:'Governance Council vs Governance Committee:',options:['Council = strategy, Committee = execution','They are the same','Committee is higher than Council','Council is technical, Committee is business'],correct:0,explanation:'Council = sets strategy/policies. Committee = working group executing decisions.'},
{id:'m2_60',topic:'compliance',type:'truefalse',question:'Compliance only matters for financial institutions.',options:['True','False'],correct:1,explanation:'False. GDPR, HIPAA, and other regulations apply across many industries.'},
{id:'m2_61',topic:'gov_def',type:'single',question:'The relationship between Governance and Quality is:',options:['Unrelated','Governance defines quality standards and accountability','Quality replaces Governance','Governance only handles security'],correct:1,explanation:'Governance coordinates quality efforts: standards, metrics, accountability.'},
{id:'m2_62',topic:'gov_components',type:'single',question:'Which process handles controlled modifications to data definitions?',options:['Data Issue Management','Data Change Management','Data Backup','Data Encryption'],correct:1,explanation:'Data Change Management = controlled modifications to data and metadata.'},
{id:'m2_63',topic:'maturity',type:'fillin',question:'At which maturity level are processes standardized? (English level name)',correct:['defined','Defined'],explanation:'Level 3 = Defined = standardized and documented processes.'},
{id:'m2_64',topic:'gov_roles',type:'single',question:'In governance, "escalation" means:',options:['Increasing server capacity','Elevating unresolved issues to higher authority','Encrypting data','Deleting old records'],correct:1,explanation:'Escalation = passing unresolved issues to a higher decision-making level.'},
{id:'m2_65',topic:'compliance',type:'single',question:'Governance ensures data practices comply with:',options:['Fashion trends','Regulatory requirements and internal policies','Social media trends','Competitor strategies'],correct:1,explanation:'Governance ensures compliance with laws, regulations, and internal policies.'},
{id:'m2_66',topic:'gov_def',type:'single',question:'Governance provides the MOST value by:',options:['Adding more processes','Reducing ambiguity about data ownership and rules','Increasing data volume','Standardizing hardware'],correct:1,explanation:'Primary value = clarity on who owns data, what rules apply, how decisions are made.'},
{id:'m2_67',topic:'gov_components',type:'single',question:'Data Security Policy defines:',options:['Backup schedules','Data access controls and classification rules','Query optimization','Report formatting'],correct:1,explanation:'Security Policy = rules for access control, data classification, and protection.'},
{id:'m2_68',topic:'maturity',type:'truefalse',question:'Level 2 (Repeatable) means processes are fully optimized.',options:['True','False'],correct:1,explanation:'False. Level 2 = basic repeatable processes. Optimization is Level 5.'},
{id:'m2_69',topic:'gov_roles',type:'single',question:'A Coordinating Data Steward manages:',options:['Servers','A team of data stewards across the organization','External vendors only','Marketing campaigns'],correct:1,explanation:'Coordinating Steward = coordinates a group of stewards in large orgs.'},
{id:'m2_70',topic:'compliance',type:'single',question:'Data Usage Policy determines:',options:['Server specifications','How data may and may not be used','Database vendor selection','Network topology'],correct:1,explanation:'Usage Policy = rules for acceptable and prohibited uses of data.'},

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAMA DMBOK — Self-Study Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#f0f2f7;--card:#fff;--card-hover:#f8f9fc;
--sidebar:linear-gradient(180deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);
--primary:#4f46e5;--primary-light:#6366f1;--primary-bg:rgba(79,70,229,.08);
--accent:#06b6d4;--accent-bg:rgba(6,182,212,.08);
--success:#10b981;--success-bg:rgba(16,185,129,.08);
--danger:#ef4444;--danger-bg:rgba(239,68,68,.08);
--warning:#f59e0b;--warning-bg:rgba(245,158,11,.08);
--text:#1e293b;--text-secondary:#475569;--text-muted:#94a3b8;
--border:#e2e8f0;--border-light:#f1f5f9;
--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
--shadow-md:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.03);
--shadow-lg:0 10px 15px rgba(0,0,0,.06),0 4px 6px rgba(0,0,0,.03);
--radius:12px;--radius-sm:8px;--radius-xs:6px;
--sidebar-w:270px;
--font:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7;font-size:15px;-webkit-font-smoothing:antialiased}
/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--sidebar);color:#e2e8f0;overflow-y:auto;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sb-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{font-size:20px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary-light),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.sb-subtitle{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.nav-group{padding:16px 0}
.nav-group-label{padding:0 20px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.3);font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:all .2s;font-size:13px;border:none;background:none;color:rgba(255,255,255,.7);width:100%;text-align:left;font-family:var(--font);border-left:3px solid transparent;position:relative}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.05)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.1);border-left-color:var(--accent);font-weight:600}
.nav-badge{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.1)}
.nav-badge.done{background:var(--success);color:#fff}
.nav-badge.progress{background:rgba(99,102,241,.5);color:#fff}
/* MAIN */
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-title{font-weight:600;font-size:14px;color:var(--text-secondary);white-space:nowrap}
.progress-track{flex:1;max-width:360px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.topbar-actions{display:flex;gap:6px;margin-left:auto}
.btn{padding:7px 14px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-family:var(--font);color:var(--text-secondary)}
.btn:hover{border-color:var(--primary-light);color:var(--primary);box-shadow:var(--shadow)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-light);border-color:var(--primary-light);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-danger{color:var(--danger);border-color:transparent;background:transparent}
.btn-danger:hover{background:var(--danger-bg);border-color:var(--danger)}
.btn-lg{padding:12px 28px;font-size:15px;border-radius:var(--radius-sm);font-weight:600}
.content{max-width:860px;margin:0 auto;padding:28px 32px 60px;width:100%}
/* CARDS */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:28px 32px;margin-bottom:20px;box-shadow:var(--shadow);transition:box-shadow .2s}
.card h2{color:var(--primary);margin-bottom:14px;font-size:22px;font-weight:700;letter-spacing:-.3px}
.card h3{color:var(--text);margin:18px 0 10px;font-size:17px;font-weight:650}
.card h4{margin:14px 0 8px;font-size:15px;font-weight:650}
.card p{margin:6px 0}
.tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.3px}
.tag-primary{background:var(--primary-bg);color:var(--primary)}
.tag-accent{background:var(--accent-bg);color:#0891b2}
.tag-success{background:var(--success-bg);color:#059669}
/* TERM BLOCKS */
.term{background:var(--primary-bg);padding:1px 7px;border-radius:4px;font-weight:600;font-size:14px}
.term-en{color:var(--primary);font-style:italic}
.def-block{background:var(--warning-bg);border-left:3px solid var(--warning);padding:14px 18px;margin:12px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:14px}
.warn-block{background:var(--danger-bg);border-left:3px solid var(--danger);padding:14px 18px;margin:12px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:14px}
.info-block{background:var(--primary-bg);border-left:3px solid var(--primary);padding:14px 18px;margin:12px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:14px}
.example-block{background:var(--success-bg);border-left:3px solid var(--success);padding:14px 18px;margin:12px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:14px}
ul,ol{margin:6px 0 6px 22px}li{margin:3px 0;font-size:14px}
table.info-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.info-table th{background:var(--primary);color:#fff;padding:8px 14px;text-align:left;font-weight:600}
.info-table td{padding:8px 14px;border-bottom:1px solid var(--border)}
.info-table tr:hover td{background:var(--border-light)}
/* QUIZ */
.quiz-box{margin:20px 0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.quiz-header{background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.quiz-header h4{color:#fff;margin:0;font-size:15px}
.quiz-body{padding:16px 20px}
.q-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:12px;transition:all .3s}
.q-card.correct{border-color:var(--success);background:var(--success-bg)}
.q-card.wrong{border-color:var(--danger);background:var(--danger-bg)}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.q-num{font-size:11px;color:var(--text-muted);font-weight:600}
.q-type{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--primary-bg);color:var(--primary);font-weight:600}
.q-text{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.6}
.q-options{display:flex;flex-direction:column;gap:5px}
.q-opt{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-xs);cursor:pointer;transition:all .15s;background:#fff;font-size:13px}
.q-opt:hover:not(.locked){background:var(--primary-bg);border-color:var(--primary-light)}
.q-opt.selected{border-color:var(--primary);background:var(--primary-bg)}
.q-opt.correct-show{border-color:var(--success);background:var(--success-bg)}
.q-opt.wrong-show{border-color:var(--danger);background:var(--danger-bg)}
.q-opt.locked{cursor:default}
.q-opt input{margin-top:2px;accent-color:var(--primary)}
.q-fillin{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:14px;font-family:var(--font)}
.q-fillin:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.match-left{padding:9px 12px;background:var(--primary-bg);border-radius:var(--radius-xs);font-size:13px;display:flex;align-items:center}
.match-select{padding:8px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:13px;font-family:var(--font)}
.q-check{margin-top:8px}
.q-expl{margin-top:10px;padding:12px 16px;border-radius:var(--radius-xs);font-size:13px;line-height:1.6;display:none}
.q-expl.show{display:block}
.q-expl.ok{background:var(--success-bg);border:1px solid rgba(16,185,129,.2)}
.q-expl.fail{background:var(--danger-bg);border:1px solid rgba(239,68,68,.2)}
/* RESULT */
.result-card{text-align:center;padding:32px;border-radius:var(--radius);margin:20px 0;border:2px solid}
.result-card.pass{border-color:var(--success);background:var(--success-bg)}
.result-card.fail{border-color:var(--danger);background:var(--danger-bg)}
.result-score{font-size:56px;font-weight:800;letter-spacing:-2px}
.result-card.pass .result-score{color:var(--success)}
.result-card.fail .result-score{color:var(--danger)}
.result-sub{font-size:16px;margin-top:6px;color:var(--text-secondary)}
/* HOME */
.home-hero{background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#06b6d4 100%);border-radius:var(--radius);padding:36px 32px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden}
.home-hero::after{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(255,255,255,.1) 0%,transparent 70%);border-radius:50%}
.home-hero h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.home-hero p{opacity:.85;font-size:15px;max-width:500px}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin:20px 0}
.home-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.home-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--primary-light)}
.home-card h3{font-size:14px;font-weight:650;margin-bottom:6px;color:var(--text)}
.home-card p{font-size:12px;color:var(--text-muted)}
.home-card .mc-bar{margin-top:12px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.home-card .mc-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;transition:width .5s}
/* INPUT */
.input{padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);width:100%;max-width:320px;transition:border-color .15s}
.input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
/* GLOSSARY */
.g-search{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);margin-bottom:14px}
.g-search:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
/* TEST START */
.test-start{text-align:center;padding:40px 20px}
.test-start .icon{font-size:48px;margin-bottom:16px}
.test-start h3{font-size:20px;margin-bottom:8px}
.test-start p{color:var(--text-muted);margin-bottom:20px;font-size:14px}
.attempt-history{margin-top:20px}
.attempt-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius-xs);margin-bottom:6px;font-size:13px}
.attempt-row .score{font-weight:700}
/* MOBILE */
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--primary);color:#fff;border:none;padding:8px 12px;border-radius:var(--radius-xs);font-size:18px;cursor:pointer;box-shadow:var(--shadow-md)}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
.main{margin-left:0}.menu-toggle{display:block}.content{padding:16px}.card{padding:18px}
}
.figure-box{margin:24px 0;background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.figure-box img{display:block;width:100%;height:auto}
.figure-box figcaption{padding:10px 16px;font-size:12px;color:var(--text-muted);background:var(--border-light);border-top:1px solid var(--border);line-height:1.5}
.figure-box figcaption strong{color:var(--text-secondary)}
.module-export-bar{margin-top:24px;padding:20px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius)}
.module-export-bar .meb-top{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.module-export-bar .meb-label{font-size:14px;font-weight:600;color:var(--text);flex:1}
.module-export-bar .meb-hint{font-size:12px;color:var(--text-muted);margin-top:8px}
@media print{.sidebar,.topbar,.menu-toggle{display:none}.main{margin-left:0}}
</style>
</head>
<body>
<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776;</button>
<nav class="sidebar" id="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">DAMA DMBOK</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="topbar-actions">
      <button class="btn" onclick="exportResults('json')">Export JSON</button>
      <button class="btn" onclick="exportResults('csv')">Export CSV</button>
      <button class="btn btn-danger" onclick="resetProgress()">Reset</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
<script>
// ===================== MODULE CONTENT =====================
const MODULES=[
// ==================== MODULE 1: DATA MANAGEMENT ====================
{id:'m1',title:'Data Management',chapter:'DAMA DMBOK Chapter 1',
objectives:['Understand data, information, knowledge, wisdom (DIKW)','Know the DAMA Wheel and 11 knowledge areas','Understand data as an enterprise asset','Know data lifecycle stages','Understand data management principles and roles'],
sections:[
{title:'1. Данные, информация, знания, мудрость — иерархия DIKW',content:`
<p>Для эффективного управления данными необходимо чётко различать уровни абстракции информации. DAMA DMBOK использует модель <span class="term">DIKW</span> — иерархию, описывающую переход от сырых фактов к принятию решений.</p>

<svg viewBox="0 0 500 320" style="width:100%;max-width:500px;display:block;margin:20px auto" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient></defs>
  <polygon points="250,20 450,280 50,280" fill="none" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="100" y="230" width="300" height="45" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="250" y="258" text-anchor="middle" font-size="15" font-weight="700" fill="#4f46e5">DATA / Данные</text>
  <rect x="135" y="175" width="230" height="45" rx="6" fill="#c7d2fe" stroke="#6366f1" stroke-width="1.5"/>
  <text x="250" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#4338ca">INFORMATION / Информация</text>
  <rect x="170" y="120" width="160" height="45" rx="6" fill="#a5b4fc" stroke="#6366f1" stroke-width="1.5"/>
  <text x="250" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">KNOWLEDGE / Знания</text>
  <rect x="205" y="65" width="90" height="45" rx="6" fill="url(#g1)" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="250" y="93" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">WISDOM</text>
  <text x="250" y="305" text-anchor="middle" font-size="11" fill="#64748b">Пирамида DIKW — от сырых фактов к мудрости</text>
</svg>

<div class="def-block"><strong>Данные / Data</strong> — представление фактов в формализованном виде, пригодном для передачи и обработки. Данные сами по себе не имеют значения: число «42» без контекста — просто число.</div>

<div class="def-block"><strong>Информация / Information</strong> — данные, помещённые в контекст и наделённые смыслом. «42 заявки от клиентов за вчерашний день» — это уже информация, потому что мы знаем, ЧТО означает число, КОГДА и ОТКУДА оно получено.</div>

<div class="def-block"><strong>Знание / Knowledge</strong> — информация, обогащённая опытом, анализом и пониманием закономерностей. «Количество заявок растёт на 20% каждый квартал и коррелирует с маркетинговыми кампаниями» — это знание, потому что здесь есть распознанный паттерн и причинно-следственная связь.</div>

<div class="def-block"><strong>Мудрость / Wisdom</strong> — способность применять знания для принятия правильных решений в новых, ранее не встречавшихся ситуациях. Решение перераспределить бюджет маркетинга на основании выявленных закономерностей — это применение мудрости.</div>

<div class="example-block"><strong>Пример прохождения по уровням DIKW:</strong><br>
<strong>Data:</strong> 150, 200, 180, 220<br>
<strong>Information:</strong> Продажи продукта А по кварталам за 2025 год составили 150, 200, 180, 220 тыс. руб.<br>
<strong>Knowledge:</strong> Продажи растут в среднем на 12% год к году; падение в Q3 связано с сезонным фактором.<br>
<strong>Wisdom:</strong> Заранее увеличить запасы перед Q4 и запланировать промо-акцию в Q3 для сглаживания сезонного спада.</div>

<div class="warn-block"><strong>Важно:</strong> DAMA DMBOK отмечает ограничения модели DIKW: она предполагает, что данные «просто существуют», хотя для создания данных уже нужны знания. Кроме того, линейная последовательность «от данных к мудрости» не учитывает, что данные и информация тесно переплетены. Несмотря на эти ограничения, DIKW остаётся полезной концептуальной моделью для понимания уровней абстракции.</div>

<div class="info-block"><strong>Для бизнес-аналитика:</strong> Вы работаете преимущественно на уровнях Information и Knowledge. Ваша задача — превращать сырые данные в осмысленную информацию через анализ требований и помогать организации строить знания для принятия решений.</div>
`,
checkQuestions:[
{type:'single',question:'Какой правильный порядок уровней DIKW снизу вверх?',options:['Knowledge → Information → Data → Wisdom','Data → Information → Knowledge → Wisdom','Information → Data → Wisdom → Knowledge','Data → Knowledge → Information → Wisdom'],correct:1,explanation:'DIKW: Data → Information → Knowledge → Wisdom.'},
{type:'truefalse',question:'Данные расходуются при использовании, как физические активы.',options:['Верно','Неверно'],correct:1,explanation:'Неисчерпаемость — ключевое свойство данных. Они не расходуются при использовании.'},
{type:'single',question:'Аналитик обнаружил, что продажи растут на 20% после каждой email-рассылки. Какой это уровень DIKW?',options:['Data','Information','Knowledge','Wisdom'],correct:2,explanation:'Распознанная закономерность (причина-следствие) = Knowledge.'}
]},
{title:'2. Данные как актив и определение Data Management',content:`
<h4>Данные как корпоративный актив / Data as an Enterprise Asset</h4>
<p>Одна из фундаментальных концепций DAMA DMBOK: <span class="term">данные — это актив организации / <span class="term-en">data is an asset</span></span>. Как и другие активы (здания, оборудование, интеллектуальная собственность), данные имеют ценность, требуют инвестиций в управление и могут создавать конкурентные преимущества.</p>

<p>Однако данные обладают <strong>уникальными свойствами</strong>, отличающими их от физических активов:</p>

<svg viewBox="0 0 560 200" style="width:100%;max-width:560px;display:block;margin:16px auto" xmlns="http://www.w3.org/2000/svg">
  <rect x="5" y="5" width="160" height="80" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>

<h4>Определение Data Management</h4>
<div class="def-block"><strong>Управление данными / Data Management</strong> — разработка, выполнение и надзор (<span class="term-en">supervision</span>) за планами, политиками, программами и практиками, которые доставляют, контролируют, защищают и повышают ценность данных и информационных активов на протяжении их жизненного цикла.</div>

<p>Ключевые аспекты этого определения:</p>
<ul>
<li><strong>Планы и политики</strong> — управление данными начинается с планирования и стратегии, а не с технологий</li>
<li><strong>Жизненный цикл</strong> — данные проходят стадии от создания до удаления</li>
<li><strong>Повышение ценности</strong> — конечная цель — увеличить отдачу от данных для бизнеса</li>
<li><strong>Контроль и защита</strong> — обеспечение качества, безопасности и соответствия требованиям</li>
</ul>

<h4>Стратегия управления данными / Data Strategy</h4>
<p><span class="term">Стратегия управления данными / <span class="term-en">Data Management Strategy</span></span> должна быть <strong>производной от бизнес-стратегии</strong> организации. Она определяет: какие данные критичны для бизнеса, как ими управлять, какие инвестиции необходимы, и какие метрики покажут успех.</p>

<div class="warn-block"><strong>Типичная ошибка:</strong> Начинать управление данными «снизу» — с технических решений (купить инструмент, настроить ETL). Правильный подход — начинать с <strong>бизнес-целей</strong> и строить стратегию данных как поддержку бизнес-стратегии.</div>
`,

{title:'3. Жизненный цикл данных / Data Lifecycle',content:`
<p>DAMA DMBOK определяет жизненный цикл данных как <strong>циклическую модель</strong> (Figure 2), включающую следующие ключевые активности. Понимание этих стадий помогает бизнес-аналитику правильно формулировать требования к системам.</p>

<figure class="figure-box"><img src="img/ch1_fig02_lifecycle.jpg" alt="Figure 2 — Data Lifecycle Key Activities. Циклическая модель: Plan → Design & Enable → Create/Obtain → Store/Maintain → Use → Enhance, с ответвлением Dispose of"><figcaption><strong>Figure 2 —</strong> Data Lifecycle Key Activities. Циклическая модель: Plan → Design &amp; Enable → Create/Obtain → Store/Maintain → Use → Enhance, с ответвлением Dispose of</figcaption></figure>

  <line x1="87" y1="55" x2="100" y2="55" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="102" y="25" width="80" height="60" rx="8" fill="#c7d2fe" stroke="#6366f1" stroke-width="1.5"/>
  <text x="142" y="48" text-anchor="middle" font-size="9" font-weight="700" fill="#4338ca">Design &amp;</text>
  <text x="142" y="60" text-anchor="middle" font-size="9" font-weight="700" fill="#4338ca">Enable</text>
  <text x="142" y="75" text-anchor="middle" font-size="8" fill="#475569">Проектировать</text>
  <line x1="184" y1="55" x2="197" y2="55" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="199" y="25" width="80" height="60" rx="8" fill="#a5b4fc" stroke="#6366f1" stroke-width="1.5"/>
  <text x="239" y="48" text-anchor="middle" font-size="9" font-weight="700" fill="#3730a3">Create /</text>
  <text x="239" y="60" text-anchor="middle" font-size="9" font-weight="700" fill="#3730a3">Obtain</text>
  <text x="239" y="75" text-anchor="middle" font-size="8" fill="#475569">Создать</text>
  <line x1="281" y1="55" x2="294" y2="55" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="296" y="25" width="80" height="60" rx="8" fill="#818cf8" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="336" y="48" text-anchor="middle" font-size="9" font-weight="700" fill="#312e81">Store /</text>
  <text x="336" y="60" text-anchor="middle" font-size="9" font-weight="700" fill="#312e81">Maintain</text>
  <text x="336" y="75" text-anchor="middle" font-size="8" fill="#312e81">Хранить</text>
  <line x1="378" y1="55" x2="391" y2="55" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="393" y="30" width="60" height="50" rx="8" fill="#6366f1" stroke="#4338ca" stroke-width="1.5"/>
  <text x="423" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Use</text>
  <text x="423" y="65" text-anchor="middle" font-size="8" fill="#e0e7ff">Использ.</text>
  <line x1="455" y1="55" x2="468" y2="55" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="470" y="100" width="70" height="35" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="505" y="118" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">Dispose of</text>
  <line x1="505" y1="82" x2="505" y2="98" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="310" y="130" text-anchor="middle" font-size="10" fill="#64748b">Data Lifecycle Key Activities (DAMA DMBOK Figure 2)</text>
</svg>

<ol>
<li><strong>Планирование / Plan</strong> — определение требований к данным, разработка стратегии и архитектуры данных</li>
<li><strong>Проектирование и обеспечение / Design &amp; Enable</strong> — моделирование данных, проектирование структур, создание инфраструктуры для хранения и доступа</li>
<li><strong>Создание и получение / Create / Obtain</strong> — данные возникают: ввод пользователем, генерация системой, получение из внешних источников (API, файлы, IoT-устройства)</li>
<li><strong>Хранение и поддержка / Store / Maintain</strong> — данные сохраняются в базах данных, файловых системах, облачных хранилищах; обеспечиваются их качество и доступность</li>
<li><strong>Использование / Use</strong> — данные читаются, обрабатываются, анализируются для принятия решений и операционных процессов</li>
<li><strong>Улучшение / Enhance</strong> — повышение качества данных: очистка, обогащение, интеграция, стандартизация</li>
<li><strong>Утилизация / Dispose of</strong> — данные архивируются или окончательно удаляются по истечении срока хранения или по требованию регуляторов (например, GDPR «право на забвение»)</li>
</ol>

<div class="info-block"><strong>Для бизнес-аналитика:</strong> При анализе требований к системе задавайте вопросы по каждой стадии жизненного цикла:
<ul>
<li><strong>Plan:</strong> Какие данные нужны? Какая стратегия?</li>
<li><strong>Design &amp; Enable:</strong> Какая структура данных? Какие системы обеспечат хранение?</li>
<li><strong>Create / Obtain:</strong> Откуда берутся данные? Кто или что их создаёт?</li>
<li><strong>Store / Maintain:</strong> Где и как хранятся? Какие требования к доступности и качеству?</li>
<li><strong>Use:</strong> Кто потребители данных? Для каких процессов?</li>
<li><strong>Enhance:</strong> Как улучшать качество данных? Какие правила очистки?</li>
<li><strong>Dispose of:</strong> Каков срок хранения? Есть ли регуляторные требования к удалению?</li>
</ul></div>

<div class="example-block"><strong>Пример:</strong> Заявка на кредит. <strong>Plan</strong> — определяем, какие данные необходимы для скоринга. <strong>Design &amp; Enable</strong> — проектируем модель данных для заявок. <strong>Create/Obtain</strong> — клиент заполняет форму. <strong>Store/Maintain</strong> — данные сохраняются в CRM. <strong>Use</strong> — скоринговая система оценивает риск. <strong>Enhance</strong> — данные обогащаются из внешних бюро. <strong>Dispose of</strong> — через 10 лет данные удаляются по требованиям регулятора.</div>
`,

{title:'4. Структура DAMA DMBOK и колесо DAMA / DAMA Wheel',content:`
<p><span class="term">DAMA DMBOK</span> (<span class="term-en">Data Management Body of Knowledge</span>) — это свод знаний по управлению данными, разработанный международной ассоциацией <span class="term">DAMA International</span>. Текущая версия — <strong>DMBOK2</strong> (второе издание, 2017 год). Это <strong>фреймворк</strong> — набор общепринятых практик и принципов, а не стандарт или методология.</p>

<h4>Колесо DAMA / DAMA Wheel</h4>
<p>Визуальная структура DMBOK представлена в виде <strong>колеса</strong>. В центре — <span class="term">Data Governance</span> (руководство данными), координирующая все остальные области. Вокруг — 10 областей знаний:</p>


<figure class="figure-box"><img src="img/ch1_fig05_dama_wheel.jpg" alt="Figure 5 — DAMA Wheel. Data Governance в центре, 10 областей знаний вокруг"><figcaption><strong>Figure 5 —</strong> DAMA Wheel. Data Governance в центре, 10 областей знаний вокруг</figcaption></figure>


<p>Итого <strong>11 областей знаний / knowledge areas</strong> (включая Data Governance в центре).</p>

<p>DMBOK также описывает эволюцию этой модели (Figure 11), где области сгруппированы по трём слоям:</p>
<figure class="figure-box"><img src="img/ch1_fig11_wheel_evolved.jpg" alt="Figure 11 — DAMA Wheel Evolved. Oversight (Data Governance) наверху, Lifecycle Management в центре, Foundational Activities внизу"><figcaption><strong>Figure 11 —</strong> DAMA Wheel Evolved. Oversight (Data Governance) — слой надзора наверху, Lifecycle Management — центральный слой, Foundational Activities — базовый слой внизу</figcaption></figure>

<div class="info-block"><strong>Почему Data Governance в центре?</strong> Потому что руководство данными координирует и направляет все остальные области. Без governance остальные практики будут разрозненными. Governance определяет: <strong>кто</strong> принимает решения о данных, <strong>какие правила</strong> действуют, <strong>как контролируется</strong> их соблюдение.</div>

<h4>Контекстная диаграмма каждой области знаний</h4>
<p>Каждая из 11 областей описана в DMBOK по единому шаблону (контекстной диаграмме, см. Figure 7):</p>
<ul>
<li><strong>Definition / Определение</strong> — что это за область</li>
<li><strong>Goals / Цели</strong> — чего стремимся достичь</li>
<li><strong>Activities / Действия</strong> — конкретные практики и процессы (классифицируются по PDOC: Plan, Develop, Operate, Control)</li>
<li><strong>Inputs / Входы</strong> — что поступает на вход процессов</li>
<li><strong>Deliverables / Результаты</strong> — что производится на выходе</li>
<li><strong>Suppliers, Participants, Consumers / Поставщики, участники, потребители</strong></li>
<li><strong>Roles and Responsibilities / Роли и ответственности</strong></li>
<li><strong>Techniques / Техники</strong></li>
<li><strong>Tools / Инструменты</strong></li>
<li><strong>Metrics / Метрики</strong></li>
</ul>
`,

{title:'5. Принципы и роли в управлении данными',content:`
<h4>Принципы управления данными / Data Management Principles</h4>
<p>DAMA DMBOK выделяет группы принципов, охватывающих все аспекты управления данными:</p>
<ul>
<li><strong>Data is an asset with unique properties</strong> — данные имеют ценность, не расходуются при использовании, и их ценность можно и нужно выражать в экономических терминах</li>
<li><strong>Managing data means managing quality</strong> — обеспечение качества данных — неотъемлемая часть управления ими</li>
<li><strong>It takes Metadata to manage data</strong> — для управления данными необходимы метаданные</li>
<li><strong>It takes planning to manage data</strong> — управление данными требует стратегического планирования, а не реактивных действий</li>
<li><strong>Data management is cross-functional</strong> — требует сотрудничества бизнеса и IT, с учётом разных перспектив</li>
<li><strong>Data management requires an enterprise perspective</strong> — необходим взгляд на уровне всей организации</li>
<li><strong>Data management must account for risks</strong> — управление данными включает управление связанными рисками</li>
<li><strong>Effective data management requires leadership commitment</strong> — без поддержки руководства инициативы обречены на провал</li>
</ul>

<h4>Ключевые роли / Key Roles</h4>
<div class="info-block"><strong>Примечание:</strong> Глава 1 кратко упоминает роли (Data Stewards, CDO) как примеры специалистов по управлению данными. Детальное описание ролей приводится в <strong>главе 3</strong> (Data Governance) и <strong>главе 16</strong> (Data Management Organization). Ниже — обзор ключевых ролей для общего понимания.</div>

<ul>
<li><span class="term">Data Owner / Data Trustee</span> — <strong>бизнес-руководитель</strong>, ответственный за конкретный домен данных (клиентские данные, финансовые данные). Принимает стратегические решения: кто имеет доступ, каковы стандарты качества, как данные используются.</li>
<li><span class="term">Data Steward</span> — <strong>операционная роль</strong>: ежедневное управление качеством данных, соблюдение правил и стандартов. Два типа:
  <ul>
  <li><strong>Business Data Steward</strong> — определяет бизнес-правила, контролирует качество с точки зрения бизнеса</li>
  <li><strong>Technical Data Steward</strong> — обеспечивает техническую реализацию правил (профилирование, мониторинг)</li>
  </ul>
</li>
<li><span class="term">Data Custodian</span> — <strong>техническая роль</strong> (обычно IT): физическое хранение, бэкапы, безопасность на уровне инфраструктуры</li>
<li><span class="term">CDO / Chief Data Officer</span> — руководитель, ответственный за стратегию управления данными на уровне всей организации</li>
</ul>

<div class="warn-block"><strong>Типичные ошибки при различении ролей:</strong>
<ul>
<li><strong>Owner vs Steward:</strong> Owner ОТВЕЧАЕТ за данные (стратегический уровень). Steward ЗАБОТИТСЯ о данных (операционный уровень). Owner — «владелец квартиры», Steward — «управляющий домом».</li>
<li><strong>Steward vs Custodian:</strong> Steward — бизнес-роль (что данные значат, какие правила). Custodian — техническая роль (где данные хранятся, как бэкапить).</li>
</ul></div>

<h4>Организационные модели управления данными</h4>
<div class="info-block"><strong>Примечание:</strong> Организационные модели подробно рассматриваются в <strong>главе 16</strong> (Data Management Organization), где описаны 5 моделей: Decentralized, Network, Centralized, Hybrid, Federated. Ниже — три наиболее распространённые.</div>
<ul>
<li><strong>Centralized / Централизованная</strong> — единая команда управляет всеми данными организации. Плюс: единые стандарты. Минус: может быть далеко от бизнес-контекста.</li>
<li><strong>Decentralized / Децентрализованная</strong> — каждое подразделение управляет своими данными самостоятельно. Плюс: близость к бизнесу. Минус: несогласованность.</li>
<li><strong>Federated / Федеративная</strong> — <strong>наиболее распространённая в крупных организациях</strong>. Единые стандарты и политики на уровне организации, исполнение — на уровне подразделений.</li>
</ul>

<div class="info-block"><strong>Для бизнес-аналитика:</strong> В федеративной модели вы будете работать с локальными стюардами данных вашего подразделения, но следовать общекорпоративным стандартам и политикам. Знание того, кто является Data Owner для нужных вам данных — ключ к быстрому согласованию требований.</div>
`,

{id:'m2',title:'Data Governance',chapter:'DAMA DMBOK Chapter 3',
objectives:['Understand data governance definition and goals','Distinguish governance from management','Know governance organizational structures','Understand data policies and standards','Know maturity model levels'],
sections:[
{title:'1. Определение, цели и отличие от Data Management',content:`
<div class="def-block"><strong>Руководство данными / Data Governance</strong> — осуществление полномочий, контроля и совместного принятия решений (планирование, мониторинг и обеспечение выполнения) в отношении управления данными как активом.</div>

<p>Data Governance — это <strong>не техническая система</strong>, а управленческая и организационная функция. Она определяет три ключевых вопроса:</p>


<figure class="figure-box"><img src="img/ch3_fig14_dg_context.jpg" alt="Figure 14 — Context Diagram: Data Governance and Stewardship. 3 цели, 4 группы активностей, входы/выходы, роли, инструменты, метрики"><figcaption><strong>Figure 14 —</strong> Context Diagram: Data Governance and Stewardship. 3 цели, 4 группы активностей, входы/выходы, роли, инструменты, метрики</figcaption></figure>


<h4>Data Governance vs Data Management</h4>
<p>Эти два понятия часто путают. Ключевое различие:</p>
<ul>
<li><span class="term">Data Management</span> — <strong>вся совокупность</strong> практик по работе с данными (все 11 областей DAMA)</li>
<li><span class="term">Data Governance</span> — <strong>одна из областей</strong> data management, которая <strong>координирует и направляет</strong> все остальные области</li>
</ul>

<div class="example-block"><strong>Аналогия:</strong> Если представить компанию, то Data Management — это все департаменты вместе (HR, финансы, производство, маркетинг...), а Data Governance — это совет директоров, который определяет стратегию, правила и контролирует их соблюдение всеми департаментами.</div>

<h4>Цели Data Governance (по Figure 14)</h4>
<ul>
<li><strong>Обеспечить управление данными как активом</strong> (<span class="term-en">Enable an organization to manage its data as an asset</span>) — основная цель governance</li>
<li><strong>Определить, утвердить и внедрить</strong> принципы, политики, процедуры, метрики, инструменты и <span class="term">accountability / подотчётность</span> за управление данными</li>
<li><strong>Мониторить и направлять</strong> соблюдение политик (<span class="term-en">policy compliance</span>), использование данных и управленческие активности</li>
</ul>
<p>Эти три цели охватывают: снижение рисков, <span class="term">compliance</span> (соответствие GDPR, HIPAA и отраслевым нормам), повышение ценности данных и поддержку <span class="term">data-driven decision making</span>.</p>

<div class="warn-block"><strong>Типичная ошибка:</strong> «Governance = бюрократия и замедление работы». На самом деле хорошо организованный governance <strong>ускоряет</strong> работу: люди знают, кто отвечает за данные, где найти правильные определения, какие правила действуют. Governance снимает неопределённость, а не создаёт бумажную волокиту.</div>
`,

{type:'truefalse',question:'Data Governance и Data Management — синонимы.',options:['Верно','Неверно'],correct:1,explanation:'Management = все практики. Governance = одна область, координирующая остальные.'},

{title:'2. Организационная структура и компоненты программы',content:`
<h4>Организационная структура Data Governance</h4>


<figure class="figure-box"><img src="img/ch3_fig16_dg_org.jpg" alt="Figure 16 — Data Governance Organization Parts. CDO/CIO матрица: от Enterprise через Divisions до Local уровня"><figcaption><strong>Figure 16 —</strong> Data Governance Organization Parts. CDO/CIO матрица: от Enterprise через Divisions до Local уровня</figcaption></figure>

<figure class="figure-box"><img src="img/ch3_fig18_cdo_pyramid.jpg" alt="Figure 18 — CDO Organizational Touch Points. Пирамида: Financials → Governance → Multiplier Effect (SDLC, EAI, DQ Programs)"><figcaption><strong>Figure 18 —</strong> CDO Organizational Touch Points. Пирамида: Financials → Governance → Multiplier Effect (SDLC, EAI, DQ Programs)</figcaption></figure>


<ul>
<li><span class="term">Executive Sponsor</span> — топ-менеджер, обеспечивающий поддержку и ресурсы. <strong>Без спонсора программа governance не выживет</strong> — у неё не будет авторитета и бюджета.</li>
<li><span class="term">Data Governance Steering Committee</span> — <strong>высший орган</strong>, ответственный за надзор, поддержку и финансирование программы Data Governance. Состоит из кросс-функциональной группы топ-менеджеров.</li>
<li><span class="term">Data Governance Council (DGC)</span> — управляет инициативами governance (разработка политик, метрик), решает проблемы и эскалации. Состоит из руководителей в соответствии с операционной моделью.</li>
<li><span class="term">Data Governance Office (DGO)</span> — подразделение, координирующее все операционные активности по governance.</li>
<li><span class="term">Data Stewardship Teams</span> — команды стюардов данных, фокусирующиеся на конкретных предметных областях или проектах.</li>
</ul>

<h4>Политики данных / Data Policies</h4>
<p><span class="term">Политика данных / Data Policy</span> — формальный документ, устанавливающий правила обращения с данными на высоком уровне.</p>

<table class="info-table">
<tr><th>Тип политики</th><th>Что определяет</th><th>Пример</th></tr>
<tr><td><strong>Data Quality Policy</strong></td><td>Стандарты качества, правила валидации</td><td>«Все email-адреса должны быть валидированы при вводе»</td></tr>
<tr><td><strong>Data Security Policy</strong></td><td>Правила доступа, классификации, защиты</td><td>«Персональные данные доступны только HR и юристам»</td></tr>
<tr><td><strong>Data Retention Policy</strong></td><td>Сроки хранения, правила удаления</td><td>«Данные заявок хранятся 7 лет, затем удаляются»</td></tr>
<tr><td><strong>Data Usage Policy</strong></td><td>Допустимые способы использования</td><td>«Клиентские данные нельзя использовать для обучения ML без согласия»</td></tr>
</table>

<div class="def-block"><strong>Data Standard</strong> — более детальный документ с конкретными правилами и нормами. Например: формат даты — ISO 8601 (YYYY-MM-DD), правила наименования полей (snake_case), допустимые значения справочников. <strong>Policy = «что делать»</strong>, <strong>Standard = «как именно делать»</strong>.</div>

<h4>Процессы governance<
<figure class="figure-box"><img src="img/ch3_fig19_dg_ops.jpg" alt="Figure 19 — Data Governance Operations. Executive Council → Enterprise DG Oversight → DGC → DGO (Domain DG + Forums)"><figcaption><strong>Figure 19 —</strong> Data Governance Operations. Executive Council → Enterprise DG Oversight → DGC → DGO (Domain DG + Forums)</figcaption></figure>
</h4>
<ul>
<li><span class="term">Data Issue Management</span> — систематический процесс выявления, документирования и решения проблем с данными (дубликаты, ошибки, несогласованность)</li>
<li><span class="term">Organizational Change Management (OCM)</span> — управление организационными изменениями: преодоление сопротивления, обучение, коммуникации, получение поддержки сотрудников для внедрения практик governance</li>
<li><span class="term">Escalation</span> — процедура передачи нерешённых вопросов на более высокий уровень принятия решений</li>
</ul>

<h4>Метрики governance</h4>
<ul>
<li><strong>Policy compliance rate</strong> — уровень соответствия политикам</li>
<li><strong>Data issues resolved</strong> — количество решённых проблем</li>
<li><strong>Stewardship coverage</strong> — процент данных под управлением стюардов</li>
<li><strong>Data management maturity</strong> — уровень зрелости</li>
</ul>
`,

{title:'3. Модель зрелости и подходы к внедрению',content:`
<h4>Data Management Maturity Model</h4>
<p>Для оценки текущего состояния управления данными используются модели зрелости. DMBOK ссылается на модель зрелости CMMI (<span class="term-en">Capability Maturity Model Integration</span>), подробно рассматриваемую в главе 15. Уровни зрелости помогают понять, где находится организация и какие шаги приоритетны.</p>

<svg viewBox="0 0 560 200" style="width:100%;max-width:560px;display:block;margin:16px auto" xmlns="http://www.w3.org/2000/svg">
  <rect x="5" y="140" width="85" height="50" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="47" y="160" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">Level 0</text>
  <text x="47" y="175" text-anchor="middle" font-size="8" fill="#475569">Нет управл.</text>
  <rect x="97" y="115" width="85" height="75" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="139" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#d97706">Level 1</text>
  <text x="139" y="155" text-anchor="middle" font-size="8" fill="#475569">Initial</text>
  <text x="139" y="168" text-anchor="middle" font-size="7" fill="#64748b">Ad hoc</text>
  <rect x="189" y="90" width="85" height="100" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="231" y="115" text-anchor="middle" font-size="9" font-weight="700" fill="#0284c7">Level 2</text>
  <text x="231" y="130" text-anchor="middle" font-size="8" fill="#475569">Repeatable</text>
  <text x="231" y="143" text-anchor="middle" font-size="7" fill="#64748b">Базовые процессы</text>
  <rect x="281" y="65" width="85" height="125" rx="6" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="323" y="90" text-anchor="middle" font-size="9" font-weight="700" fill="#0d9488">Level 3</text>
  <text x="323" y="105" text-anchor="middle" font-size="8" fill="#475569">Defined</text>
  <text x="323" y="118" text-anchor="middle" font-size="7" fill="#64748b">Стандартизир.</text>
  <rect x="373" y="40" width="85" height="150" rx="6" fill="#c7d2fe" stroke="#6366f1" stroke-width="1.5"/>
  <text x="415" y="65" text-anchor="middle" font-size="9" font-weight="700" fill="#4f46e5">Level 4</text>
  <text x="415" y="80" text-anchor="middle" font-size="8" fill="#475569">Managed</text>
  <text x="415" y="93" text-anchor="middle" font-size="7" fill="#64748b">Измеряемые</text>
  <rect x="465" y="15" width="85" height="175" rx="6" fill="#4f46e5" stroke="#3730a3" stroke-width="1.5"/>
  <text x="507" y="40" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Level 5</text>
  <text x="507" y="55" text-anchor="middle" font-size="8" fill="#c7d2fe">Optimizing</text>
  <text x="507" y="68" text-anchor="middle" font-size="7" fill="#c7d2fe">Постоянное</text>
  <text x="507" y="78" text-anchor="middle" font-size="7" fill="#c7d2fe">улучшение</text>
</svg>

<table class="info-table">
<tr><th>Уровень</th><th>Название</th><th>Характеристика</th></tr>
<tr><td>0</td><td>No capability</td><td>Нет формального управления данными, хаос</td></tr>
<tr><td>1</td><td>Initial</td><td>Отдельные инициативы, нет системности, ad hoc</td></tr>
<tr><td>2</td><td>Repeatable</td><td>Базовые процессы определены и могут повторяться</td></tr>
<tr><td>3</td><td>Defined</td><td>Процессы стандартизированы и документированы</td></tr>
<tr><td>4</td><td>Managed</td><td>Процессы измеряются количественно и контролируются</td></tr>
<tr><td>5</td><td>Optimizing</td><td>Постоянное совершенствование на основе метрик</td></tr>
</table>

<div class="warn-block"><strong>Типичная ошибка:</strong> Пытаться «перепрыгнуть» уровни — например, сразу с Level 1 на Level 5. Зрелость — постепенный процесс, каждый уровень строится на предыдущем. Если организация на Level 1, начните с определения базовых процессов (путь к Level 2), а не с внедрения сложных метрик.</div>

<h4>Подходы к внедрению governance</h4>
<p>DMBOK подчёркивает, что внедрение governance требует <strong>организационного управления изменениями (OCM)</strong>, поддержки руководства и инкрементального подхода. На практике выделяют три стратегии:</p>
<ul>
<li><strong>Top-down / Сверху вниз</strong> — инициатива идёт от руководства. Сильная сторона: авторитет и ресурсы. Риск: может восприниматься как «навязывание» и вызвать сопротивление.</li>
<li><strong>Bottom-up / Снизу вверх</strong> — инициатива от операционных команд. Сильная сторона: практичность и понимание реальных проблем. Риск: недостаток полномочий для масштабных изменений.</li>
<li><strong>Combined / Комбинированный</strong> — поддержка сверху + практическая реализация снизу. Сочетает авторитет руководства с практическим знанием команд.</li>
</ul>

<h4>Data Governance и смежные области</h4>
<ul>
<li><strong>Governance → Data Quality:</strong> Governance определяет стандарты качества, метрики и ответственных. Без governance инициативы по качеству разрозненны.</li>
<li><strong>Governance → Compliance:</strong> Governance обеспечивает соответствие GDPR, HIPAA и отраслевым нормам.</li>
<li><strong>Governance → Metadata:</strong> Без метаданных (описания данных) governance невозможен — нельзя управлять тем, что не описано.</li>
</ul>
`,

{id:'m3',title:'Data Architecture',chapter:'DAMA DMBOK Chapter 4',
objectives:['Understand data architecture definition and goals','Know Enterprise Architecture domains','Know key architecture artifacts (DFD, CRUD, catalog)','Understand As-Is / To-Be and roadmaps','Know TOGAF and Zachman frameworks'],
sections:[
{title:'1. Определение и место в Enterprise Architecture',content:`
<div class="def-block"><strong>Архитектура данных / Data Architecture</strong> — определение потребностей организации в данных (независимо от структуры) и проектирование/поддержание <span class="term">мастер-чертежей / <span class="term-en">master blueprints</span></span> для удовлетворения этих потребностей. Мастер-чертежи используются для управления интеграцией данных, контроля данных как активов и согласования инвестиций в данные с бизнес-стратегией.</div>

<h4>Enterprise Architecture (EA)</h4>
<p>Data Architecture является одним из четырёх доменов <span class="term">корпоративной архитектуры / Enterprise Architecture</span>:</p>


<figure class="figure-box"><img src="img/ch4_fig21_arch_context.jpg" alt="Figure 21 — Context Diagram: Data Architecture. Цели, активности (Establish DA, Integrate with EA), инструменты и метрики"><figcaption><strong>Figure 21 —</strong> Context Diagram: Data Architecture. Цели, активности (Establish DA, Integrate with EA), инструменты и метрики</figcaption></figure>


<h4>Цели архитектуры данных</h4>
<ul>
<li>Определить потребности организации в данных и согласовать их с бизнес-стратегией</li>
<li>Управлять сложностью ландшафта данных</li>
<li>Поддержать <span class="term">data reuse</span> — повторное использование данных</li>
<li>Уменьшить <span class="term">data redundancy</span> — избыточное дублирование</li>
<li>Устранить <span class="term">data silos</span> — изолированные «островки» данных, не связанные с другими системами</li>
<li>Создать основу для интеграции данных</li>
</ul>

<div class="warn-block"><strong>Типичная ошибка:</strong> Путать архитектуру данных с моделированием данных. <strong>Архитектура</strong> — стратегический уровень: какие данные нужны, где хранятся, как связаны с бизнесом (аналог: <em>план города</em>). <strong>Моделирование</strong> — детальное проектирование структуры конкретных наборов данных (аналог: <em>чертёж здания</em>).</div>

<div class="info-block"><strong>Для бизнес-аналитика:</strong> Архитектура данных — это «карта» данных организации. Когда вы начинаете проект, архитектура помогает ответить: «Где найти нужные данные? Откуда они берутся? Какие системы их используют?» Это экономит недели исследований.</div>

{title:'2. Артефакты архитектуры данных',content:`
<p>Архитектор данных создаёт ряд <span class="term">артефактов / artifacts</span> — документов и моделей, описывающих архитектуру:</p>

<h4>Data Catalog / Каталог данных</h4>
<p>Инвентаризация всех наборов данных организации с описанием назначения, владельцев и расположения. Отвечает на вопрос: «Какие данные у нас есть и кому они принадлежат?»</p>

<h4>Data Flow Diagram (DFD) / Потоковая диаграмма</h4>
<p>Визуализация движения данных между системами. Показывает источники данных, потребителей, преобразования и хранилища.</p>

<svg viewBox="0 0 500 180" style="width:100%;max-width:500px;display:block;margin:16px auto" xmlns="http://www.w3.org/2000/svg">
  <defs><marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#6366f1"/></marker></defs>
  <rect x="10" y="55" width="100" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="60" y="78" text-anchor="middle" font-size="10" font-weight="600" fill="#4f46e5">CRM</text>
  <text x="60" y="92" text-anchor="middle" font-size="8" fill="#475569">Источник</text>
  <rect x="200" y="40" width="100" height="80" rx="40" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="250" y="75" text-anchor="middle" font-size="10" font-weight="600" fill="#0d9488">ETL</text>
  <text x="250" y="90" text-anchor="middle" font-size="8" fill="#475569">Преобразование</text>
  <rect x="390" y="55" width="100" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="440" y="78" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">DWH</text>
  <text x="440" y="92" text-anchor="middle" font-size="8" fill="#475569">Хранилище</text>
  <line x1="112" y1="80" x2="198" y2="80" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="302" y1="80" x2="388" y2="80" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="155" y="73" text-anchor="middle" font-size="8" fill="#64748b">Данные клиентов</text>
  <text x="345" y="73" text-anchor="middle" font-size="8" fill="#64748b">Очищенные данные</text>
  <text x="250" y="155" text-anchor="middle" font-size="10" fill="#64748b">Упрощённый пример Data Flow Diagram</text>
</svg>

<h4>CRUD Matrix</h4>
<p>Таблица, сопоставляющая бизнес-процессы с наборами данных. Показывает, какие данные какими процессами создаются (<strong>C</strong>reate), читаются (<strong>R</strong>ead), обновляются (<strong>U</strong>pdate) и удаляются (<strong>D</strong>elete).</p>

<table class="info-table">
<tr><th>Процесс / Данные</th><th>Клиенты</th><th>Заказы</th><th>Продукты</th></tr>
<tr><td>Регистрация клиента</td><td><strong>C</strong></td><td></td><td><strong>R</strong></td></tr>
<tr><td>Оформление заказа</td><td><strong>R</strong></td><td><strong>C</strong></td><td><strong>R, U</strong></td></tr>
<tr><td>Возврат товара</td><td><strong>R</strong></td><td><strong>U</strong></td><td><strong>U</strong></td></tr>
<tr><td>Удаление аккаунта</td><td><strong>D</strong></td><td><strong>U</strong></td><td></td></tr>
</table>

<h4>Subject Area Model</h4>
<p>Высокоуровневая модель, показывающая ключевые <span class="term">предметные области / subject areas</span> организации и их связи: клиенты, продукты, заказы, финансы, поставщики.</p>
<figure class="figure-box"><img src="img/ch4_fig24_subject_area.jpg" alt="Figure 24 — Subject Area Model Example. Три предметные области: Product Design, Commercial Offer, Sales с сущностями и связями"><figcaption><strong>Figure 24 —</strong> Subject Area Model Example. Три предметные области: Product Design, Commercial Offer, Sales с сущностями и связями</figcaption></figure>

<h4>Data Flow Diagram и Data Flow Matrix</h4>
<figure class="figure-box"><img src="img/ch4_fig25_data_flow_matrix.jpg" alt="Figure 25 — Data Flow Depicted in a Matrix. Процессы × сущности — какие данные создаются (●) и используются (○) каким процессом"><figcaption><strong>Figure 25 —</strong> Data Flow Depicted in a Matrix. Процессы × сущности — закрашенный круг (●) = Create, открытый круг (○) = Read/Use</figcaption></figure>

<figure class="figure-box"><img src="img/ch4_fig26_data_flow.jpg" alt="Figure 26 — System Data Flow Diagram. Потоки данных между PDM, CRM, Sales, Manufacturing и Aftermarket системами"><figcaption><strong>Figure 26 —</strong> System Data Flow Diagram. Потоки данных между PDM, CRM, Sales, Manufacturing и Aftermarket системами</figcaption></figure>

<h4>Авторитетный источник данных / System of Record</h4>
<div class="def-block"><strong>System of Record</strong> (авторитетный источник данных, часто называемый <span class="term">Single Source of Truth / SSOT</span>) — принцип, согласно которому каждый элемент данных имеет <strong>один авторитетный источник</strong>, из которого берутся все копии. DMBOK использует термин «system of record or other authoritative data». Это устраняет проблему «у нас 5 систем с разными данными о клиенте — какие правильные?»</div>

{title:'3. As-Is, To-Be, Roadmap и фреймворки',content:`
<h4>Два состояния архитектуры</h4>

<svg viewBox="0 0 500 100" style="width:100%;max-width:500px;display:block;margin:16px auto" xmlns="http://www.w3.org/2000/svg">
  <defs><marker id="a3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/></marker></defs>
  <rect x="10" y="15" width="150" height="60" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="85" y="42" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">As-Is</text>
  <text x="85" y="58" text-anchor="middle" font-size="10" fill="#475569">Текущее состояние</text>
  <line x1="162" y1="45" x2="208" y2="45" stroke="#6366f1" stroke-width="2" marker-end="url(#a3)" stroke-dasharray="6,3"/>
  <rect x="170" y="25" width="160" height="40" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="250" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#4f46e5">Roadmap / Дорожная карта</text>
  <rect x="340" y="15" width="150" height="60" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="415" y="42" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">To-Be</text>
  <text x="415" y="58" text-anchor="middle" font-size="10" fill="#475569">Целевое состояние</text>
  <text x="250" y="95" text-anchor="middle" font-size="10" fill="#64748b">Архитектурное планирование: от текущего к целевому состоянию</text>
</svg>

<ul>
<li><span class="term">As-Is / Текущее состояние</span> — описание существующей архитектуры: какие данные есть, где хранятся, как перемещаются, какие проблемы существуют.</li>
<li><span class="term">To-Be / Целевое состояние</span> — видение будущей архитектуры, отражающее бизнес-стратегию и устраняющее текущие проблемы.</li>
<li><span class="term">Roadmap / Дорожная карта</span> — план перехода от As-Is к To-Be: приоритизированные инициативы, этапы, зависимости, ресурсы.</li>
</ul>

<div class="warn-block"><strong>Типичная ошибка:</strong> Создавать целевую архитектуру (To-Be) без анализа текущего состояния (As-Is). Архитектура «на бумаге» без понимания реальности нежизнеспособна. Всегда начинайте с As-Is.</div>

<h4>Фреймворки архитектуры</h4>
<ul>
<li><span class="term">Zachman Framework</span> — <strong>наиболее известный</strong> фреймворк корпоративной архитектуры (по DMBOK). Матричный подход, сопоставляющий 6 вопросов (что, как, где, кто, когда, зачем) с 6 <strong>перспективами</strong> (<span class="term-en">perspectives</span>): Executive, Business Management, Architect, Engineer, Technician, Enterprise. Помогает организовать архитектурные знания.</li>
<li><span class="term">TOGAF</span> (The Open Group Architecture Framework) — широко применяемый фреймворк корпоративной архитектуры. Определяет ADM (Architecture Development Method) — пошаговый метод разработки архитектуры.</li>
</ul>

<h4>Типичные вызовы архитектуры данных</h4>
<ul>
<li><strong>Data Silos</strong> — разрозненные данные в изолированных системах, не связанных между собой. Одна из главных проблем, которую решает архитектура.</li>
<li><strong>Technical Debt</strong> — накопленные архитектурные компромиссы и «быстрые решения», которые затрудняют развитие.</li>
<li><strong>Shadow IT</strong> — системы и базы данных, созданные подразделениями без ведома и координации с IT-отделом.</li>
</ul>

<div class="info-block"><strong>Для бизнес-аналитика:</strong> Когда формулируете требования к новой системе, спросите: «Есть ли целевая архитектура данных (To-Be)?» Это поможет убедиться, что ваш проект вписывается в общую стратегию и не создаёт новых data silos.</div>
`,

{id:'m4',title:'Data Modeling & Design',chapter:'DAMA DMBOK Chapter 5',
objectives:['Know entities, attributes, relationships, constraints','Distinguish CDM, LDM, PDM','Understand cardinality and keys','Know normalization (1NF, 2NF, 3NF)','Understand Star and Snowflake schemas'],
sections:[
{title:'1. Основы моделирования: сущности, атрибуты, связи',content:`
<div class="def-block"><strong>Моделирование данных / Data Modeling</strong> — процесс обнаружения, анализа и определения требований к данным (<span class="term-en">discovering, analyzing, and scoping data requirements</span>), а затем представления и передачи этих требований в точной форме, называемой <span class="term">моделью данных / data model</span>.</div>

<h4>Четыре основных элемента модели данных</h4>
<ul>
<li><strong>Entities / Сущности</strong> — объекты, о которых хранятся данные (Клиент, Заказ)</li>
<li><strong>Relationships / Связи</strong> — как сущности связаны друг с другом</li>
<li><strong>Attributes / Атрибуты</strong> — свойства сущностей (имя, дата, цена)</li>
<li><strong>Domains / Домены</strong> — допустимые множества значений для атрибутов (тип данных, ограничения)</li>
</ul>

<figure class="figure-box"><img src="img/ch5_fig28_modeling_context.jpg" alt="Figure 28 — Context Diagram: Data Modeling and Design. Активности: Plan, Build (CDM/LDM/PDM), Review, Maintain data models"><figcaption><strong>Figure 28 —</strong> Context Diagram: Data Modeling and Design. Активности: Plan, Build (CDM/LDM/PDM), Review, Maintain data models</figcaption></figure>

<figure class="figure-box"><img src="img/ch5_fig46_conceptual.jpg" alt="Figure 46 — Relational Conceptual Data Model. Пример CDM: School — Student — Application с основными связями"><figcaption><strong>Figure 46 —</strong> Relational Conceptual Data Model. Пример CDM: School — Student — Application с основными связями</figcaption></figure>


<h4>Три уровня моделей данных</h4>

<table class="info-table">
<tr><th>Характеристика</th><th>CDM (Conceptual)</th><th>LDM (Logical)</th><th>PDM (Physical)</th></tr>
<tr><td><strong>Аудитория</strong></td><td>Бизнес</td><td>Бизнес + IT</td><td>IT / DBA</td></tr>
<tr><td><strong>Детализация</strong></td><td>Низкая — только сущности и связи</td><td>Высокая — + атрибуты, ключи, правила</td><td>Максимальная — + типы данных, индексы</td></tr>
<tr><td><strong>Привязка к СУБД</strong></td><td>Нет</td><td>Нет</td><td>Да</td></tr>
<tr><td><strong>Нормализация</strong></td><td>Не применяется</td><td>Обычно да (3NF)</td><td>Может быть денорм.</td></tr>
<tr><td><strong>Пример содержимого</strong></td><td>Клиент — Заказ — Продукт</td><td>+ ФИО, email, дата заказа, цена</td><td>+ VARCHAR(100), INDEX, PARTITION</td></tr>
</table>

<div class="warn-block"><strong>Типичная ошибка:</strong> Пропускать CDM и сразу строить логическую или физическую модель. CDM — ключевой инструмент для согласования понимания данных с бизнесом. Без CDM есть риск построить систему, которая хранит «не те» данные.</div>

<div class="example-block"><strong>Пример перехода CDM → LDM → PDM:</strong><br>
<strong>CDM:</strong> Клиент — [размещает] — Заказ — [содержит] — Продукт (3 сущности, 2 связи)<br>
<strong>LDM:</strong> Клиент (ФИО, email, телефон, адрес) → Заказ (номер, дата, сумма, статус) → Продукт (название, цена, SKU, категория)<br>
<strong>PDM:</strong> CREATE TABLE customers (id SERIAL PK, name VARCHAR(100), email VARCHAR(255) UNIQUE, ...); CREATE INDEX idx_email ON customers(email);</div>

<div class="info-block"><strong>Для бизнес-аналитика:</strong> Моделирование данных — один из ваших ключевых навыков. Вы должны уметь читать модели данных и участвовать в создании CDM. Концептуальная модель — ваш основной инструмент для фиксации бизнес-требований к данным.</div>
`,
checkQuestions:[
{type:'single',question:'Какая модель создаётся для бизнес-аудитории без технических деталей?',options:['PDM','LDM','CDM','ERD'],correct:2,explanation:'CDM = Conceptual Data Model — для бизнеса, без технических деталей.'},
{type:'single',question:'Какая модель привязана к конкретной СУБД?',options:['CDM','LDM','PDM','Все три'],correct:2,explanation:'PDM (Physical Data Model) оптимизирована для конкретной СУБД.'},

]},
{title:'2. Связи, ключи, нормализация и схемы DWH',content:`
<h4>Кардинальность / Cardinality</h4>



<h4>Ключи / Keys</h4>
<ul>
<li><span class="term">Primary Key (PK)</span> — уникальный идентификатор записи в сущности</li>
<li><span class="term">Foreign Key (FK)</span> — атрибут, ссылающийся на PK другой сущности, реализующий связь</li>
<li><span class="term">Natural Key</span> — ключ на основе реальных данных (ИНН, email). Может измениться!</li>
<li><span class="term">Surrogate Key</span> — искусственный ключ, созданный системой (auto-increment ID). Стабильнее.</li>
</ul>

<h4>Нормализация / Normalization</h4>
<div class="def-block"><strong>Нормализация</strong> — процесс применения правил для организации бизнес-сложности в стабильные структуры данных (<span class="term-en">stable data structures</span>). Основная цель — хранить каждый атрибут только в одном месте, устраняя избыточность и возможные несоответствия.</div>

<table class="info-table">
<tr><th>Форма</th><th>Требование</th><th>Пример нарушения</th></tr>
<tr><td><strong>1NF</strong></td><td>Атомарность атрибутов, наличие валидного PK, устранение повторяющихся групп и связей M:N</td><td>Поле «Телефоны» = «+7-999-111, +7-999-222»</td></tr>
<tr><td><strong>2NF</strong></td><td>1NF + каждый неключевой атрибут зависит от <em>всего</em> PK</td><td>Частичная зависимость от составного ключа</td></tr>
<tr><td><strong>3NF</strong></td><td>2NF + нет транзитивных зависимостей</td><td>Город зависит от индекса, а не от PK</td></tr>
</table>

<p><span class="term">Денормализация / Denormalization</span> — сознательное нарушение NF для ускорения чтения. <strong>OLTP</strong> обычно нормализован (3NF). <strong>OLAP</strong> часто денормализован.</p>

<h4>Схемы хранилищ данных</h4>


<figure class="figure-box"><img src="img/ch5_fig49_snowflake.jpg" alt="Figure 49 — Dimensional Logical Data Model. Admissions fact в центре, dimensions не свёрнуты (Snowflake): Country→Region→Zone, School→SchoolLevel, Semester→Year"><figcaption><strong>Figure 49 —</strong> Dimensional Logical Data Model. Dimensions не свёрнуты — такая структура называется Snowflake Schema</figcaption></figure>

<figure class="figure-box"><img src="img/ch5_fig51_star.jpg" alt="Figure 51 — Dimensional Physical Data Model. Тот же домен, но dimensions свёрнуты (Star Schema) — сравните с Figure 49"><figcaption><strong>Figure 51 —</strong> Dimensional Physical Data Model. Dimensions свёрнуты в единые таблицы — такая структура называется Star Schema</figcaption></figure>


<ul>
<li><span class="term">Fact Table</span> = числовые метрики (сумма продажи, количество, стоимость) + FK на dimensions</li>
<li><span class="term">Dimension Table</span> = описательные атрибуты (кто купил, что, когда, где)</li>
</ul>

<h4>Нотации моделирования</h4>
<ul>
<li><span class="term">IE (Information Engineering)</span> — нотация с символом «crow's foot» (воронья лапка) для обозначения «многие». <strong>Наиболее распространена</strong>.</li>
<li><span class="term">UML</span> (Unified Modeling Language) — универсальный язык, используется для диаграмм классов</li>
<li><span class="term">IDEF1X</span> (<span class="term-en">Integration Definition for Information Modeling</span>) — нотация реляционного моделирования, принятая как стандарт FIPS</li>
</ul>
`,

{id:'m5',title:'Data Storage & Operations',chapter:'DAMA DMBOK Chapter 6',
objectives:['Know RDBMS vs NoSQL types','Understand ACID properties','Distinguish OLTP and OLAP','Know backup types and RPO/RTO','Understand cloud models and data virtualization'],
sections:[
{title:'1. Типы СУБД: RDBMS, NoSQL и свойства ACID',content:`
<p>Эта область DAMA DMBOK охватывает «физическую» сторону работы с данными: выбор и управление СУБД, обеспечение доступности, производительности и восстановления.</p>

<h4>Реляционные СУБД / RDBMS</h4>
<p>Хранят данные в таблицах (строки × столбцы), используют SQL. Обеспечивают <span class="term">ACID</span>-свойства транзакций:</p>


<figure class="figure-box"><img src="img/ch6_fig54_storage_context.jpg" alt="Figure 54 — Context Diagram: Data Storage and Operations. Активности: Manage Database Technology, Manage Database Operations"><figcaption><strong>Figure 54 —</strong> Context Diagram: Data Storage and Operations. Активности: Manage Database Technology, Manage Database Operations</figcaption></figure>

<figure class="figure-box"><img src="img/ch6_db_spectrum.jpg" alt="Database Structure Spectrum. От Hierarchical (Tree Schema) через Relational (Schema on Write) к Non-Relational (Schema on Read)"><figcaption><strong></strong> Database Structure Spectrum. От Hierarchical (Tree Schema) через Relational (Schema on Write) к Non-Relational (Schema on Read)</figcaption></figure>


<ul>
<li><strong>Atomicity / Атомарность</strong> — транзакция выполняется полностью или не выполняется вообще (переводим деньги: списание + зачисление = одна неделимая операция)</li>
<li><strong>Consistency / Согласованность</strong> — транзакция переводит БД из одного корректного состояния в другое (баланс не может стать отрицательным, если это запрещено)</li>
<li><strong>Isolation / Изолированность</strong> — параллельные транзакции не влияют друг на друга (два оператора не продадут последний билет одному клиенту)</li>
<li><strong>Durability / Долговечность</strong> — после фиксации (commit) данные сохраняются даже при сбое системы</li>
</ul>
<p>Примеры RDBMS: Oracle, PostgreSQL, MySQL, SQL Server.</p>

<h4>BASE — альтернатива ACID для распределённых систем</h4>
<p>DMBOK описывает <span class="term">BASE</span> как противоположность ACID, применяемую в распределённых и NoSQL системах:</p>
<ul>
<li><strong>Basically Available</strong> — система всегда доступна, даже если часть узлов недоступна</li>
<li><strong>Soft State</strong> — состояние системы может меняться со временем даже без новых входных данных (из-за процессов синхронизации)</li>
<li><strong>Eventually Consistent</strong> — система достигает согласованности в конечном итоге, но не гарантирует мгновенную согласованность</li>
</ul>

<div class="info-block"><strong>ACID vs BASE:</strong> ACID приоритизирует согласованность (consistency), BASE — доступность (availability). Выбор зависит от требований: банковская транзакция требует ACID, лента социальной сети допускает BASE.</div>

<h4>NoSQL СУБД</h4>
<p>Семейство СУБД, не использующих реляционную модель. DMBOK классифицирует нереляционные базы данных по нескольким категориям (Column-oriented, Key-Value, Spatial, Object/Multi-media, Flat File, Triplestore), при этом Document и Graph базы рассматриваются как подвиды Key-Value. На практике наиболее распространены четыре типа:</p>

<table class="info-table">
<tr><th>Тип</th><th>Модель данных</th><th>Пример</th><th>Когда использовать</th></tr>
<tr><td><strong>Document store</strong></td><td>JSON-документы</td><td>MongoDB</td><td>Гибкая структура, веб-приложения</td></tr>
<tr><td><strong>Key-Value</strong></td><td>Ключ → значение</td><td>Redis</td><td>Кэширование, сессии</td></tr>
<tr><td><strong>Column-family</strong></td><td>Данные по столбцам</td><td>Cassandra, HBase</td><td>Большие объёмы, высокая запись</td></tr>
<tr><td><strong>Graph</strong></td><td>Узлы + связи</td><td>Neo4j</td><td>Социальные сети, рекомендации</td></tr>
</table>


<figure class="figure-box"><img src="img/ch6_centralized_distributed.jpg" alt="Centralized vs Distributed Database. Единое представление данных: одна локация vs несколько синхронизированных"><figcaption><strong></strong> Centralized vs Distributed Database. Единое представление данных: одна локация vs несколько синхронизированных</figcaption></figure>

<figure class="figure-box"><img src="img/ch6_cap_theorem.jpg" alt="CAP Theorem. Распределённая система гарантирует только 2 из 3: Consistency, Availability, Partition Tolerance"><figcaption><strong></strong> CAP Theorem. Распределённая система гарантирует только 2 из 3: Consistency, Availability, Partition Tolerance</figcaption></figure>
<h4>OLTP vs OLAP</h4>
<table class="info-table">
<tr><th></th><th>OLTP</th><th>OLAP</th></tr>
<tr><td><strong>Назначение</strong></td><td>Транзакционная обработка</td><td>Аналитическая обработка</td></tr>
<tr><td><strong>Операции</strong></td><td>Много коротких INSERT/UPDATE</td><td>Сложные SELECT с агрегациями</td></tr>
<tr><td><strong>Нормализация</strong></td><td>Высокая (3NF)</td><td>Низкая (Star/Snowflake)</td></tr>
<tr><td><strong>Данные</strong></td><td>Текущие, оперативные</td><td>Исторические, аналитические</td></tr>
<tr><td><strong>Примеры</strong></td><td>CRM, ERP, банковские системы</td><td>Data Warehouse, BI-системы</td></tr>
</table>

<div class="warn-block"><strong>Типичная ошибка:</strong> Использовать одну систему для OLTP и OLAP одновременно. Аналитические запросы замедляют транзакции, а частые обновления мешают аналитике. Эти нагрузки следует разделять.</div>
`,

{title:'2. Резервное копирование, RPO/RTO и облачные модели',content:`
<h4>Типы резервного копирования / Backup Types</h4>
<ul>
<li><strong>Full Backup / Полное</strong> — полная копия всех данных. Самый надёжный, но медленный и объёмный.</li>
<li><strong>Incremental Backup / Инкрементальное</strong> — только изменения с последнего бэкапа (любого типа). Быстрый, но восстановление требует всех инкрементов.</li>
<li><strong>Differential Backup / Дифференциальное</strong> — изменения с последнего <em>полного</em> бэкапа. Компромисс между скоростью и надёжностью.</li>
</ul>

<h4>Ключевые метрики доступности</h4>


<figure class="figure-box"><img src="img/ch6_sla.jpg" alt="SLA Structure. Service Level Agreements между Data Owners/Stewards, IT Data Management Services и DBA/NSA. Включает System и Database Performance/Availability/Recovery"><figcaption><strong></strong> SLA Structure. Service Level Agreements между Data Owners/Stewards, IT Data Management Services и DBA/NSA. Включает System и Database Performance/Availability/Recovery</figcaption></figure>


<p><span class="term">SLA (Service Level Agreement)</span> — формальное соглашение об уровне обслуживания, включающее RPO, RTO, доступность (99.9% и т.д.).</p>

<div class="example-block"><strong>Пример:</strong> RPO = 1 час означает, что при сбое допустима потеря данных максимум за последний час (нужны бэкапы каждый час). RTO = 30 минут означает, что система должна быть восстановлена в течение 30 минут после сбоя.</div>

<h4>Облачные модели / Cloud Models</h4>
<p>DMBOK обсуждает виртуализацию и облачные платформы, упоминая Database-as-a-Service (DaaS). Ниже — общепринятая классификация облачных сервисов:</p>
<table class="info-table">
<tr><th>Модель</th><th>Что предоставляется</th><th>Пример</th></tr>
<tr><td><strong>IaaS</strong></td><td>Infrastructure as a Service — серверы, хранение, сеть</td><td>AWS EC2, Azure VMs</td></tr>
<tr><td><strong>PaaS</strong></td><td>Platform as a Service — платформа для разработки</td><td>Heroku, Google App Engine</td></tr>
<tr><td><strong>SaaS</strong></td><td>Software as a Service — готовое ПО</td><td>Salesforce, Google Workspace</td></tr>
<tr><td><strong>DBaaS</strong></td><td>Database as a Service — управляемая СУБД</td><td>Amazon RDS, Azure SQL</td></tr>
</table>

<h4>Виртуализация данных / Data Virtualization</h4>
<div class="def-block"><strong>Data Virtualization</strong> — технология, позволяющая обращаться к данным из разных источников как к единому набору, <strong>без физического перемещения данных</strong>. Создаёт виртуальный слой абстракции поверх множества источников.</div>

<div class="info-block"><strong>Для бизнес-аналитика:</strong> RPO и RTO — ключевые <strong>нефункциональные требования</strong>, которые вы должны собирать. Спрашивайте бизнес-заказчиков: «Сколько данных допустимо потерять при сбое?» (RPO) и «Как быстро система должна восстановиться?» (RTO).</div>
`,
checkQuestions:[
{type:'single',question:'RPO определяет:',options:['Скорость запросов','Максимально допустимую потерю данных','Размер БД','Количество серверов'],correct:1,explanation:'RPO = Recovery Point Objective = допустимая потеря данных.'},
{type:'truefalse',question:'Data Virtualization перемещает данные физически.',options:['Верно','Неверно'],correct:1,explanation:'Виртуализация создаёт виртуальный слой БЕЗ перемещения данных.'},

{id:'m6',title:'Data Integration & Interoperability',chapter:'DAMA DMBOK Chapter 8',

sections:[
{title:'1. Определение, ETL vs ELT и виртуализация',content:`
<div class="def-block"><strong>Интеграция данных / Data Integration</strong> — процессы, связанные с перемещением и консолидацией данных внутри и между хранилищами данных, приложениями и организациями (<span class="term-en">movement and consolidation of data within and between data stores, applications and organizations</span>). Интеграция консолидирует данные в согласованные формы — как физические, так и виртуальные.</div>
<div class="def-block"><strong>Интероперабельность / Data Interoperability</strong> — способность нескольких систем обмениваться данными (<span class="term-en">the ability for multiple systems to communicate</span>).</div>

<p><strong>Integration</strong> фокусируется на <em>объединении</em> данных. <strong>Interoperability</strong> — на <em>способности обмениваться</em>.</p>


<figure class="figure-box"><img src="img/ch8_fig67_etl.jpg" alt="Figure 67 — ETL Process Flow. Source → Extract → Staging → Transform (с Lookups/Mappings) → Load → Target"><figcaption><strong>Figure 67 —</strong> ETL Process Flow. Source → Extract → Staging → Transform (с Lookups/Mappings) → Load → Target</figcaption></figure>

<figure class="figure-box"><img src="img/ch8_fig68_elt.jpg" alt="Figure 68 — ELT Process Flow. Source → Extract → Load → Target, затем Transform внутри Target. Для Big Data / Cloud DWH"><figcaption><strong>Figure 68 —</strong> ELT Process Flow. Source → Extract → Load → Target, затем Transform внутри Target. Для Big Data / Cloud DWH</figcaption></figure>
<h4>ETL vs ELT</h4>

<svg viewBox="0 0 520 200" style="width:100%;max-width:520px;display:block;margin:16px auto" xmlns="http://www.w3.org/2000/svg">

  <text x="300" y="140" text-anchor="middle" font-size="10" font-weight="700" fill="#0d9488">Transform</text>
  <text x="420" y="140" font-size="9" fill="#64748b">→ Облачные DWH</text>
  <text x="260" y="185" text-anchor="middle" font-size="9" fill="#64748b">ELT популярен благодаря мощным облачным хранилищам (Snowflake, BigQuery)</text>

<p><strong>Data Virtualization</strong> — без физического перемещения, через виртуальный слой. Данные остаются в источниках.</p>

<p><strong>API Integration</strong> — DMBOK упоминает API и RESTful API в контексте сервис-ориентированной архитектуры (SOA). Основные подходы на практике:</p>
